.sheetbar{display:flex;align-items:stretch;gap:0;padding:0 8px;background:linear-gradient(180deg,var(--panel2),color-mix(in srgb,var(--panel2) 70%,var(--line)));border-top:1px solid var(--line);min-height:38px;overflow:auto}
.sheet{appearance:none;border:1px solid transparent;border-bottom:0;background:transparent;color:var(--muted);padding:8px 14px;font:inherit;font-size:.8rem;cursor:grab;border-radius:8px 8px 0 0;margin-top:6px;white-space:nowrap}
.sheet:hover{background:color-mix(in srgb,var(--panel) 70%,transparent);color:var(--text)}
.sheet.active{background:var(--panel);color:var(--text);font-weight:700;border-color:var(--line);box-shadow:0 -2px 0 var(--accent) inset;cursor:default}
.sheet.dragging{opacity:.45}.sheet.drag-over{box-shadow:inset 3px 0 0 var(--accent)}
.sheet input{border:1px solid var(--accent);border-radius:6px;padding:1px 6px;font:inherit;width:120px;background:var(--panel);color:var(--text)}
.sheet-add{margin:6px 0 0 4px;border:1px dashed var(--line);background:var(--panel);color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer;font:inherit}
.menu-wrap{position:relative}.menu{display:none;position:absolute;right:0;top:calc(100% + 6px);min-width:230px;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:6px;z-index:40}
.menu.open{display:block}.menu button,.menu .mi{width:100%;text-align:left;border:0;background:transparent;color:var(--text);padding:8px 10px;border-radius:8px;font:inherit;cursor:pointer;display:block}
.menu button:hover{background:var(--panel2)}.menu .sep{height:1px;background:var(--line);margin:4px 0}
.popup,.dlg{position:fixed;z-index:50;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:12px;min-width:260px;color:var(--text)}
#colFilterPopup{min-width:300px;width:min(340px,92vw);max-height:min(520px,85vh);overflow:auto}
#colFilterPopup .cf-links{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 8px;font-size:.75rem}
#colFilterPopup .cf-links a{color:var(--accent);text-decoration:none;cursor:pointer}
#colFilterPopup .cf-links a:hover{text-decoration:underline}
#colFilterPopup .cf-box{max-height:220px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:6px;background:var(--panel2);font-size:.8rem;display:flex;flex-direction:column;gap:3px}
#colFilterPopup .cf-sep{height:1px;background:var(--line);margin:10px 0}
#colFilterPopup .cf-sub{font-size:.72rem;color:var(--muted);margin:0 0 4px;font-weight:650}
.dlg{left:50%;top:50%;transform:translate(-50%,-50%);width:min(440px,92vw);max-height:80vh;overflow:auto}
.dlg h3{margin:0 0 10px;font-size:1rem}.dlg .row{display:grid;gap:6px;margin-bottom:10px}.dlg .row label{font-size:.75rem;color:var(--muted)}
.dlg textarea{width:100%;min-height:160px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:8px;font:inherit;font-size:.82rem;font-family:var(--mono);background:var(--panel2);color:var(--text);box-sizing:border-box}
.dlg .hint{font-size:.78rem;color:var(--muted);line-height:1.4;margin:0 0 10px}
.dlg .row input,.dlg .row select{border:1px solid var(--line);border-radius:8px;padding:8px;background:var(--panel2)}
.dlg .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px}
.backdrop{position:fixed;inset:0;background:rgba(10,16,28,.45);z-index:45}
.hidden{display:none!important}
.ctx{position:fixed;z-index:70;min-width:200px;max-width:min(280px,92vw);max-height:min(70vh,560px);overflow:auto;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:6px;display:none}
.ctx.open{display:block}
.grid.virt-mode tbody tr:not(.virt-spacer){height:34px}
.grid.virt-mode tbody tr:not(.virt-spacer) .cell{white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis;max-height:34px}
.ctx .ctx-h{font-size:.72rem;color:var(--muted);padding:4px 10px 6px;font-weight:650}
.ctx button{width:100%;text-align:left;border:0;background:transparent;color:var(--text);padding:8px 10px;border-radius:8px;font:inherit;cursor:pointer;display:flex;align-items:center;gap:8px}
.ctx button:hover{background:var(--panel2)}
.ctx .sep{height:1px;background:var(--line);margin:4px 0}
.ctx .dot{width:12px;height:12px;border-radius:99px;border:1px solid var(--line);flex-shrink:0}
.toast{position:fixed;right:16px;bottom:56px;background:var(--chrome);color:#fff;padding:10px 14px;border-radius:10px;box-shadow:var(--shadow);font-size:.82rem;z-index:60;opacity:0;transform:translateY(8px);transition:.2s}
.toast.show{opacity:1;transform:none}
.badge-st{font-size:.65rem;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:700;vertical-align:middle}
.st-c-yellow{box-shadow:inset 3px 0 0 #eab308!important}.badge-st.c-yellow{background:#fef3c7;color:#854d0e}
.st-c-red{box-shadow:inset 3px 0 0 #ef4444!important}.badge-st.c-red{background:#fee2e2;color:#991b1b}
.st-c-green{box-shadow:inset 3px 0 0 #22c55e!important}.badge-st.c-green{background:#dcfce7;color:#166534}
.st-c-blue{box-shadow:inset 3px 0 0 #3b82f6!important}.badge-st.c-blue{background:#dbeafe;color:#1e40af}
.st-c-purple{box-shadow:inset 3px 0 0 #a855f7!important}.badge-st.c-purple{background:#f3e8ff;color:#6b21a8}
.st-c-gray{box-shadow:inset 3px 0 0 #94a3b8!important}.badge-st.c-gray{background:#f1f5f9;color:#334155}
.th-inner .sort{cursor:pointer}.th-inner .sort:hover{opacity:1}
@media(max-width:980px){.main{grid-template-columns:1fr}.sidebar{border-left:0;border-top:1px solid var(--line);max-height:190px}}
@media print{body{background:#fff!important;color:#000!important;overflow:visible}.chrome,.toolbar,.sidebar,.sheetbar,.statusbar,.formulabar,.chipbar,.toast,.popup,.dlg,.backdrop,.menu,.resize,.filter-btn,.ribbon-tabs{display:none!important}.app{display:block;height:auto}.main{display:block}.workspace{padding:0}.grid-wrap{overflow:visible;border:0;box-shadow:none}.print-head{display:block!important;margin:0 0 12px}table.grid{width:100%;font-size:10pt}.grid thead th{position:static;background:#111!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
.print-head{display:none}.print-head h1{margin:0;font-size:18pt}.print-head p{margin:4px 0 0;color:#444;font-size:10pt}

.panic-cover{position:fixed;inset:0;z-index:9999;background:#f4f1e8;overflow:auto;font-family:&quot;Times New Roman&quot;,Times,serif;color:#111}
.panic-cover[hidden]{display:none!important}
.panic-doc{max-width:820px;margin:28px auto 60px;padding:28px 36px;background:#fffef8;border:1px solid #cbb;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.panic-seal{display:inline-block;border:2px solid #333;padding:4px 10px;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px}
.panic-doc h1{text-align:center;font-size:1.6rem;margin:8px 0;font-weight:700}
.panic-doc h2{text-align:center;font-size:1.15rem;margin:6px 0 18px;font-weight:700}
.panic-sub,.panic-meta{text-align:center;margin:0 0 8px;font-size:.95rem}
.panic-meta{color:#444;font-size:.82rem;margin-bottom:22px}
.panic-body{font-size:.92rem;line-height:1.55;text-align:justify}
.panic-body h3{font-size:1rem;margin:18px 0 8px;text-align:center}
.panic-body p{margin:0 0 10px;text-indent:1.5em}
.panic-hint{margin-top:28px;text-align:center;font-size:.75rem;color:#888;font-family:system-ui,sans-serif}
.dossier-block{border:1px solid var(--line);border-radius:10px;padding:10px;margin:0 0 10px;background:var(--panel2)}
.dossier-block h4{margin:0 0 8px;font-size:.85rem}
.dossier-kv{display:grid;grid-template-columns:120px 1fr;gap:4px 8px;font-size:.8rem}
.dossier-kv b{color:var(--muted);font-weight:650}
.dossier-list{max-height:180px;overflow:auto;font-size:.78rem}
.dossier-list div{padding:6px 0;border-bottom:1px solid var(--line)}

function fitColumnWidths(sh, opts){
  opts=opts||{};

  const cols=visCols(sh);
  const idxs=sorted(sh, filtered(sh));
  const cellFont=&#x27;14px &quot;Segoe UI&quot;,system-ui,sans-serif&#x27;;
  const maxW=opts.maxWidth||400;
  const minW=opts.minWidth||72;
  const maxHeadW=150;
  cols.forEach(ci=&gt;{
    let maxData=minW;
    const sample=idxs.length&gt;800?idxs.filter((_,i)=&gt;i%Math.ceil(idxs.length/800)===0):idxs;
    sample.forEach(ri=&gt;{ maxData=Math.max(maxData, measureTextWidth(sh.rows[ri][ci], cellFont)+28); });

  });

function parsePdfSmart(text, opts){
  opts=opts||{};
  const preferCols=opts.cols&amp;&amp;opts.cols!==&#x27;auto&#x27;?+opts.cols:0;
  const mode=opts.mode||&#x27;auto&#x27;;

  // 0) PDF AUM (rachunki bankowe po PESEL)
  if(mode===&#x27;aum&#x27; || mode===&#x27;auto&#x27; || mode===&#x27;aum-expand&#x27;){
    let aum=extractAumPdf(text);
    if(aum){
      if(mode===&#x27;aum-expand&#x27; || opts.expandAum) aum=expandAumToAccountRows(aum);
      return aum;
    }
    if(mode===&#x27;aum&#x27; || mode===&#x27;aum-expand&#x27;) return null;
  }

  // 1) Wzorzec tabeli PPE/US z PDF (ciąg ze spacjami + TERM WPL / KOD US)
  const ppe=extractPpeTable(text);
  if(ppe &amp;&amp; (!preferCols || preferCols===9)) return ppe;

  // 2) Zwykły podział linii
  let rows=parseText(text, mode===&#x27;auto&#x27;?&#x27;words&#x27;:mode);
  if(!rows) return null;

  // 3) Ciąg bez podziału wierszy → reflow
  if(rows.length===1 &amp;&amp; rows[0].length&gt;=(preferCols||9)){
    const w=preferCols||9;
    // jeśli zaczyna się od nagłówków LP POD… OKR ROK TERM WPL…
    const flat=rows[0];
    const joined=flat.join(&#x27; &#x27;);
    if(/LP/i.test(joined) &amp;&amp; /POD/i.test(joined) &amp;&amp; /KWOTA/i.test(joined)){
      const ppe2=extractPpeTable(joined);
      if(ppe2) return ppe2;
      // zdejmij znane nagłówki wielowyrazowe z początku
      let rest=joined.replace(/^\s*LP\s+POD\s+OKR\s+ROK\s+TERM\s+WPL\s+KOD\s+US\s+KWOTA\s+ODSETKI\s+SUMA\s+/i,&#x27;&#x27;);
      const ppe3=extractPpeTable(rest);
      if(ppe3) return ppe3;
      const tokens=rest.trim().split(/\s+/).filter(Boolean);
      const body=reflowTokens(tokens, w);
      if(body) return [PPE_HEADERS.slice(), ...body];
    }
    const body=reflowTokens(flat, w);
    if(body) rows=body;

  rows=fixMatrixHeaders(rows, preferCols||0);
  return rows;
}

function splitLine(line, mode){
  const s=String(line).replace(/\u00a0/g,&#x27; &#x27;).replace(/[\u2000-\u200b\u202f\u205f\u3000]/g,&#x27; &#x27;);
  if(mode===&#x27;tab&#x27;) return s.split(&#x27;\t&#x27;);
  if(mode===&#x27;semi&#x27;) return s.split(&#x27;;&#x27;);
  if(mode===&#x27;pipe&#x27;) return s.split(&#x27;|&#x27;);
  if(mode===&#x27;comma&#x27;) return s.split(&#x27;,&#x27;);
  if(mode===&#x27;spaces&#x27;) return s.trim().split(/\s{2,}|\t+/).filter(x=&gt;x!==&#x27;&#x27;);
  if(mode===&#x27;words&#x27;) return s.trim().split(/\s+/).filter(x=&gt;x!==&#x27;&#x27;); // każda spacja = nowa kolumna (PDF z Acrobat)
  if(s.includes(&#x27;\t&#x27;)) return s.split(&#x27;\t&#x27;);
  if((s.match(/;/g)||[]).length&gt;=2) return s.split(&#x27;;&#x27;);
  if((s.match(/\|/g)||[]).length&gt;=2) return s.split(&#x27;|&#x27;);
  if(/\s{2,}/.test(s)) return s.trim().split(/\s{2,}|\t+/).filter(x=&gt;x!==&#x27;&#x27;);
  if(/\s/.test(s.trim())) return s.trim().split(/\s+/).filter(x=&gt;x!==&#x27;&#x27;);
  return [s.trim()];
}
function scoreMatrix(rows){
  if(!rows||!rows.length) return -1;
  const widths=rows.map(r=&gt;r.length);
  const maxW=Math.max(...widths);
  if(maxW&lt;2) return 0;
  const consistent=widths.filter(w=&gt;Math.abs(w-maxW)&lt;=1).length/rows.length;
  // preferuj równy układ wielu kolumn (np. 9 z PDF), karaj chaos
  return maxW*consistent*(consistent&gt;=0.55?1:0.15);
}
function parseText(text, mode){
  const lines=String(text||&#x27;&#x27;).replace(/\r\n/g,&#x27;\n&#x27;).replace(/\r/g,&#x27;\n&#x27;).split(&#x27;\n&#x27;)
    .map(l=&gt;l.replace(/\u00a0/g,&#x27; &#x27;).replace(/[\u2000-\u200b\u202f\u205f\u3000]/g,&#x27; &#x27;))
    .filter(l=&gt;l.trim()!==&#x27;&#x27;);
  if(!lines.length) return null;
  const m=mode||&#x27;auto&#x27;;

  // PDF PPE/US: ciąg ze spacjami + nagłówki TERM WPL / KOD US
  if(m===&#x27;auto&#x27;||m===&#x27;words&#x27;||m===&#x27;ppe&#x27;){
    const ppe=extractPpeTable(lines.join(&#x27; &#x27;));
    if(ppe) return ppe;
  }
  if(m!==&#x27;auto&#x27;) return lines.map(l=&gt;splitLine(l,m).map(norm));

  // 1) Excel / TSV
  if(lines.some(l=&gt;l.includes(&#x27;\t&#x27;))){
    const rows=lines.map(l=&gt;splitLine(l,&#x27;tab&#x27;).map(norm));
    if(scoreMatrix(rows)&gt;0) return rows;
  }
  // 2) kolumny rozdzielone 2+ spacjami
  const spaced=lines.map(l=&gt;splitLine(l,&#x27;spaces&#x27;).map(norm));
  if(scoreMatrix(spaced)&gt;0) return spaced;
  // 3) inne separatory albo PDF z pojedynczymi spacjami
  let best=null, bestScore=-1;
  [&#x27;semi&#x27;,&#x27;pipe&#x27;,&#x27;comma&#x27;,&#x27;words&#x27;].forEach(mm=&gt;{
    const rows=lines.map(l=&gt;splitLine(l,mm).map(norm));
    const sc=scoreMatrix(rows);
    if(sc&gt;bestScore){ bestScore=sc; best=rows; }
  });
  if(best &amp;&amp; bestScore&gt;0) return fixMatrixHeaders(best, 0);
  return lines.map(l=&gt;[norm(l)]);
}
function matrixPreview(rows){
  if(!rows||!rows.length) return &#x27;Brak danych&#x27;;
  const cols=Math.max(...rows.map(r=&gt;r.length));
  const sample=(rows[0]||[]).slice(0,9).join(&#x27; | &#x27;)+(cols&gt;9?&#x27; | …&#x27;:&#x27;&#x27;);
  return rows.length+&#x27; wierszy × &#x27;+cols+&#x27; kolumn&#x27;+(sample?(&#x27; · np.: &#x27;+sample):&#x27;&#x27;);
}
function looksLikeHeaderRow(row, nextRow){
  if(!row||row.length&lt;2) return false;
  const filled=row.filter(c=&gt;norm(c)!==&#x27;&#x27;);
  if(filled.length&lt;Math.ceil(row.length*0.5)) return false;
  const joined=filled.join(&#x27; &#x27;).toUpperCase();
  // typowe nagłówki US/PPE
  if(/\bLP\b/.test(joined) &amp;&amp; /\bPOD\b/.test(joined) &amp;&amp; /\bKWOTA\b/.test(joined)) return true;
  if(PPE_HEADERS.every((h,i)=&gt;norm(row[i]||&#x27;&#x27;).toUpperCase()===h.toUpperCase())) return true;
  const asNumDate=filled.filter(c=&gt;{
    const v=norm(c);
    return toNum(v)!=null || /^\d{1,2}[./-]\d{1,2}[./-]\d{2,4}$/.test(v);
  }).length;
  if(asNumDate/filled.length&gt;=0.5) return false;
  if(nextRow){
    const nf=nextRow.filter(c=&gt;norm(c)!==&#x27;&#x27;);
    const nd=nf.filter(c=&gt;{ const v=norm(c); return toNum(v)!=null || /^\d{1,2}[./-]/.test(v); }).length;
    const alpha=filled.filter(c=&gt;/[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż]/.test(c) &amp;&amp; toNum(c)==null).length;
    if(alpha/filled.length&gt;=0.45 &amp;&amp; nf.length &amp;&amp; nd/nf.length&gt;=0.35) return true;
  }

}
function build(matrix){

  const first=m[0]||[]; const header=m.length&gt;1&amp;&amp;looksLikeHeaderRow(first, m[1]);
  let headers,rows; if(header){headers=first.map((h,i)=&gt;h||(&#x27;Kolumna &#x27;+letter(i))); rows=m.slice(1);} else{headers=Array.from({length:w},(_,i)=&gt;&#x27;Kolumna &#x27;+letter(i)); rows=m;}

}

function filterKey(v){
  const s=norm(v);
  if(s===&#x27;&#x27;) return &#x27;s:&#x27;;
  const n=toNum(s);
  if(n!=null) return &#x27;n:&#x27;+n;

}
function passColFilter(val, f){
  if(!f||f.mode===&#x27;any&#x27;||!f.mode) return true;
  const v=norm(val);
  if(f.mode===&#x27;empty&#x27;) return v===&#x27;&#x27;;
  if(f.mode===&#x27;notempty&#x27;) return v!==&#x27;&#x27;;
  if(f.mode===&#x27;equals&#x27;) return v.toLowerCase()===String(f.text||&#x27;&#x27;).toLowerCase();
  if(f.mode===&#x27;contains&#x27;) return !f.text || v.toLowerCase().includes(String(f.text).toLowerCase());
  if(f.mode===&#x27;not_contains&#x27;) return !f.text || !v.toLowerCase().includes(String(f.text).toLowerCase());
  if(f.mode===&#x27;starts&#x27;) return !f.text || v.toLowerCase().startsWith(String(f.text).toLowerCase());

    if(f.min!==&#x27;&#x27;&amp;&amp;f.min!=null &amp;&amp; num&lt;Number(String(f.min).replace(&#x27;,&#x27;,&#x27;.&#x27;))) return false;

    return true;

    if(!f.values||!f.values.length) return false;
    const want=f._keySet||(f._keySet=new Set(f.values.map(filterKey)));
    return want.has(filterKey(val));
  }

}

function applyColorRules(sh){

function normSelRange(r0,c0,r1,c1){
  return {r0:Math.min(r0,r1), c0:Math.min(c0,c1), r1:Math.max(r0,r1), c1:Math.max(c0,c1)};
}
function setSelRange(r0,c0,r1,c1){
  App.selRange=normSelRange(r0,c0,r1,c1);
}
function clearSelRange(){ App.selRange=null; }
function inSelRange(ri,ci){
  const s=App.selRange; if(!s) return false;
  return ri&gt;=s.r0 &amp;&amp; ri&lt;=s.r1 &amp;&amp; ci&gt;=s.c0 &amp;&amp; ci&lt;=s.c1;
}
function focusCell(ri,ci,extend){
  const sh=active(); if(!sh||ri&lt;0||ci&lt;0||ri&gt;=sh.rows.length||ci&gt;=sh.columns.length) return;
  if(App.editing) endEdit(true);
  if(extend &amp;&amp; App.anchorCell){
    setSelRange(App.anchorCell.r, App.anchorCell.c, ri, ci);
  }else{
    App.anchorCell={r:ri,c:ci};
    setSelRange(ri,ci,ri,ci);
  }
  setActiveCell(sh,ri,ci);
  sh.last=ri;
}
function moveActive(dr,dc,extend){
  const sh=active(); if(!sh||!App.activeCell) return;
  const cols=visCols(sh); if(!cols.length) return;
  const idxs=sorted(sh, filtered(sh)); if(!idxs.length) return;
  let vi=idxs.indexOf(App.activeCell.r); if(vi&lt;0) vi=0;
  let vci=cols.indexOf(App.activeCell.c); if(vci&lt;0) vci=0;
  vi=Math.max(0, Math.min(idxs.length-1, vi+dr));
  vci=Math.max(0, Math.min(cols.length-1, vci+dc));
  focusCell(idxs[vi], cols[vci], extend);
  renderGrid();
  scrollActiveIntoView();
}
function scrollActiveIntoView(){

}
function rangeTSV(sh){
  const s=App.selRange; if(!s) return &#x27;&#x27;;
  const lines=[];
  for(let r=s.r0;r&lt;=s.r1;r++){
    const row=[];
    for(let c=s.c0;c&lt;=s.c1;c++) row.push(sh.rows[r]?.[c]??&#x27;&#x27;);
    lines.push(row.join(&#x27;\t&#x27;));

}
function clearRangeCells(){
  const sh=active(); const s=App.selRange; if(!sh||!s) return;
  pushUndo();

    for(let c=s.c0;c&lt;=s.c1;c++){
      if(r&lt;sh.rows.length &amp;&amp; c&lt;sh.columns.length) sh.rows[r][c]=&#x27;&#x27;;
    }
  }
  applyColorRules(sh);
  if(App.activeCell) setActiveCell(sh, App.activeCell.r, App.activeCell.c);

function endEdit(commit){
  if(!App.editing) return;
  const sh=active();
  const {r,c,original}=App.editing;
  const inp=document.querySelector(&#x27;input.cell-editor&#x27;);
  const v=inp?inp.value.replace(/\n/g,&#x27; &#x27;).replace(/\u00a0/g,&#x27; &#x27;):(commit?original:original);
  App.editing=null;
  if(commit &amp;&amp; sh &amp;&amp; r&gt;=0 &amp;&amp; c&gt;=0 &amp;&amp; r&lt;sh.rows.length &amp;&amp; c&lt;sh.columns.length){
    if(String(sh.rows[r][c]??&#x27;&#x27;)!==v){
      pushUndo();
      sh.rows[r][c]=v;
      applyColorRules(sh);
    }
    setActiveCell(sh,r,c);

function beginEdit(ri,ci,seed){

function openColFilter(ci, anchor){

  const uniqueVals=[...byKey.values()].sort((a,b)=&gt;{
    if(a===&#x27;&#x27;&amp;&amp;b!==&#x27;&#x27;) return -1; if(b===&#x27;&#x27;&amp;&amp;a!==&#x27;&#x27;) return 1;
    const an=toNum(a), bn=toNum(b);

    &lt;div class=&quot;cf-links&quot;&gt;
      &lt;a href=&quot;#&quot; id=&quot;cfSelVisible&quot;&gt;Zaznacz widoczne&lt;/a&gt;

    &lt;div class=&quot;cf-sep&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;cf-sub&quot;&gt;Tekst&lt;/div&gt;

    &lt;label class=&quot;chk&quot; style=&quot;display:flex;gap:8px;align-items:center;font-size:.78rem;margin:0 0 8px&quot;&gt;&lt;input type=&quot;checkbox&quot; id=&quot;cfNotContains&quot;&gt; Nie zawiera (np. bez rachunku 1540)&lt;/label&gt;

    &lt;p class=&quot;hint&quot;&gt;Trzy tryby: wspólne (∩), tylko w A (A−B), tylko w B (B−A). Wynik = nowa karta (3) z pełnymi wierszami.&lt;/p&gt;
    &lt;div class=&quot;row&quot;&gt;&lt;label&gt;Tryb&lt;/label&gt;&lt;select id=&quot;cmpMode&quot;&gt;
      &lt;option value=&quot;intersect&quot;&gt;Wspólne PESEL (A ∩ B) → karta 3&lt;/option&gt;
      &lt;option value=&quot;onlyA&quot;&gt;Tylko w A (A − B)&lt;/option&gt;
      &lt;option value=&quot;onlyB&quot;&gt;Tylko w B (B − A)&lt;/option&gt;
    &lt;/select&gt;&lt;/div&gt;
    &lt;label class=&quot;chk&quot; style=&quot;display:flex;gap:8px;align-items:center;font-size:.82rem;margin:0 0 10px&quot;&gt;&lt;input type=&quot;checkbox&quot; id=&quot;cmpVisible&quot; checked&gt; Tylko widoczne wiersze (po filtrach) — np. bez rachunku 1540&lt;/label&gt;
    &lt;div class=&quot;row&quot;&gt;&lt;label&gt;Karta A&lt;/label&gt;&lt;select id=&quot;cmpSheetA&quot;&gt;${sheetOpts}&lt;/select&gt;&lt;/div&gt;
    &lt;div class=&quot;row&quot;&gt;&lt;label&gt;Kolumna klucza w A&lt;/label&gt;&lt;select id=&quot;cmpColA&quot;&gt;&lt;/select&gt;&lt;/div&gt;
    &lt;div class=&quot;row&quot;&gt;&lt;label&gt;Karta B&lt;/label&gt;&lt;select id=&quot;cmpSheetB&quot;&gt;${sheetOpts}&lt;/select&gt;&lt;/div&gt;
    &lt;div class=&quot;row&quot;&gt;&lt;label&gt;Kolumna klucza w B&lt;/label&gt;&lt;select id=&quot;cmpColB&quot;&gt;&lt;/select&gt;&lt;/div&gt;
    &lt;div class=&quot;hint&quot; id=&quot;cmpPreview&quot;&gt;Podgląd: —&lt;/div&gt;
    &lt;div class=&quot;actions&quot;&gt;
      &lt;button class=&quot;btn light&quot; type=&quot;button&quot; id=&quot;cmpCancel&quot;&gt;Anuluj&lt;/button&gt;
      &lt;button class=&quot;btn primary&quot; type=&quot;button&quot; id=&quot;cmpOk&quot; style=&quot;color:#fff&quot;&gt;Utwórz kartę&lt;/button&gt;
    &lt;/div&gt;`;
  dlg.classList.remove(&#x27;hidden&#x27;); bd.classList.remove(&#x27;hidden&#x27;);

  const fillCols=(selId, sheetId, preferName)=&gt;{
    const sh=App.sheets.find(s=&gt;s.id===sheetId); const sel=dlg.querySelector(&#x27;#&#x27;+selId);
    if(!sh){ sel.innerHTML=&#x27;&#x27;; return; }
    sel.innerHTML=sh.columns.map((c,i)=&gt;`&lt;option value=&quot;${i}&quot;&gt;${letter(i)} — ${String(c).replace(/&lt;/g,&#x27;&amp;lt;&#x27;)}&lt;/option&gt;`).join(&#x27;&#x27;);
    if(preferName){
      const idx=sh.columns.findIndex(c=&gt;norm(c).toLowerCase()===preferName);
      if(idx&gt;=0) sel.value=String(idx);
      else{
        const soft=sh.columns.findIndex(c=&gt;/pesel/i.test(String(c)));
        if(soft&gt;=0) sel.value=String(soft);
      }
    }
  };
  const sheetA=()=&gt;App.sheets.find(s=&gt;s.id===dlg.querySelector(&#x27;#cmpSheetA&#x27;).value);
  const sheetB=()=&gt;App.sheets.find(s=&gt;s.id===dlg.querySelector(&#x27;#cmpSheetB&#x27;).value);
  const mode=()=&gt;dlg.querySelector(&#x27;#cmpMode&#x27;).value||&#x27;intersect&#x27;;
  const refreshCols=()=&gt;{
    const a=sheetA(), b=sheetB();
    const prefer=a&amp;&amp;a.columns[+dlg.querySelector(&#x27;#cmpColA&#x27;).value];
    fillCols(&#x27;cmpColA&#x27;, dlg.querySelector(&#x27;#cmpSheetA&#x27;).value, prefer?norm(prefer).toLowerCase():null);
    fillCols(&#x27;cmpColB&#x27;, dlg.querySelector(&#x27;#cmpSheetB&#x27;).value, prefer?norm(prefer).toLowerCase():&#x27;pesel&#x27;);
    const aName=a?norm(a.columns[+dlg.querySelector(&#x27;#cmpColA&#x27;).value]).toLowerCase():&#x27;&#x27;;
    if(b &amp;&amp; aName){
      const bi=b.columns.findIndex(c=&gt;norm(c).toLowerCase()===aName);
      if(bi&gt;=0) dlg.querySelector(&#x27;#cmpColB&#x27;).value=String(bi);
    }
    refreshPreview();
  };
  const rowIdxs=(sh)=&gt;{
    const onlyVis=!!dlg.querySelector(&#x27;#cmpVisible&#x27;).checked;
    return onlyVis ? filtered(sh) : sh.rows.map((_,i)=&gt;i);
  };
  const countCompare=(a,b,ca,cb,m)=&gt;{
    const ia=rowIdxs(a), ib=rowIdxs(b);
    const keysA=new Set(), keysB=new Set();
    ia.forEach(i=&gt;{ const k=normKey(a.rows[i][ca]); if(k) keysA.add(k); });
    ib.forEach(i=&gt;{ const k=normKey(b.rows[i][cb]); if(k) keysB.add(k); });
    let hits=0, empty=0;
    if(m===&#x27;onlyB&#x27;){
      ib.forEach(i=&gt;{
        const k=normKey(b.rows[i][cb]);
        if(!k){ empty++; return; }
        if(!keysA.has(k)) hits++;
      });
    }else{
      ia.forEach(i=&gt;{
        const k=normKey(a.rows[i][ca]);
        if(!k){ empty++; return; }
        if(m===&#x27;intersect&#x27; ? keysB.has(k) : !keysB.has(k)) hits++;
      });
    }
    return {hits, empty, keysA:keysA.size, keysB:keysB.size, vis:!!dlg.querySelector(&#x27;#cmpVisible&#x27;).checked};
  };
  const refreshPreview=()=&gt;{
    const a=sheetA(), b=sheetB();
    const ca=+dlg.querySelector(&#x27;#cmpColA&#x27;).value, cb=+dlg.querySelector(&#x27;#cmpColB&#x27;).value;
    const el=dlg.querySelector(&#x27;#cmpPreview&#x27;);
    const m=mode();
    if(!a||!b||a.id===b.id){ el.textContent=&#x27;Podgląd: wybierz dwie różne karty&#x27;; return; }
    if(ca&lt;0||cb&lt;0||!a.columns.length||!b.columns.length){ el.textContent=&#x27;Podgląd: brak kolumn&#x27;; return; }
    const {hits,empty,vis}=countCompare(a,b,ca,cb,m);
    const label=m===&#x27;intersect&#x27;?&#x27;wspólnych&#x27;:(m===&#x27;onlyA&#x27;?&#x27;tylko w A&#x27;:&#x27;tylko w B&#x27;);
    el.textContent=&#x27;Podgląd: &#x27;+hits+&#x27; wierszy &#x27;+label+(vis?&#x27; (po filtrach)&#x27;:&#x27; (całe karty)&#x27;)+(empty?&#x27; · pominięto puste: &#x27;+empty:&#x27;&#x27;);
  };

  const act=active();
  if(act) dlg.querySelector(&#x27;#cmpSheetA&#x27;).value=act.id;
  const other=App.sheets.find(s=&gt;s.id!==(act&amp;&amp;act.id))||App.sheets[1];
  if(other) dlg.querySelector(&#x27;#cmpSheetB&#x27;).value=other.id;
  refreshCols();

  dlg.querySelector(&#x27;#cmpSheetA&#x27;).onchange=refreshCols;
  dlg.querySelector(&#x27;#cmpSheetB&#x27;).onchange=refreshCols;
  dlg.querySelector(&#x27;#cmpMode&#x27;).onchange=refreshPreview;
  dlg.querySelector(&#x27;#cmpVisible&#x27;).onchange=refreshPreview;
  dlg.querySelector(&#x27;#cmpColA&#x27;).onchange=()=&gt;{
    const a=sheetA(), b=sheetB();
    const aName=a?norm(a.columns[+dlg.querySelector(&#x27;#cmpColA&#x27;).value]).toLowerCase():&#x27;&#x27;;
    if(b &amp;&amp; aName){
      const bi=b.columns.findIndex(c=&gt;norm(c).toLowerCase()===aName);
      if(bi&gt;=0) dlg.querySelector(&#x27;#cmpColB&#x27;).value=String(bi);
    }
    refreshPreview();
  };
  dlg.querySelector(&#x27;#cmpColB&#x27;).onchange=refreshPreview;
  dlg.querySelector(&#x27;#cmpCancel&#x27;).onclick=()=&gt;{ dlg.classList.add(&#x27;hidden&#x27;); bd.classList.add(&#x27;hidden&#x27;); };
  dlg.querySelector(&#x27;#cmpOk&#x27;).onclick=()=&gt;{
    const a=sheetA(), b=sheetB();
    const ca=+dlg.querySelector(&#x27;#cmpColA&#x27;).value, cb=+dlg.querySelector(&#x27;#cmpColB&#x27;).value;
    const m=mode();
    if(!a||!b||a.id===b.id){ toast(&#x27;Wybierz dwie różne karty&#x27;); return; }
    if(!a.columns.length||!b.columns.length){ toast(&#x27;Obie karty muszą mieć kolumny&#x27;); return; }
    const ia=rowIdxs(a), ib=rowIdxs(b);
    const keysA=new Set(), keysB=new Set();
    ia.forEach(i=&gt;{ const k=normKey(a.rows[i][ca]); if(k) keysA.add(k); });
    ib.forEach(i=&gt;{ const k=normKey(b.rows[i][cb]); if(k) keysB.add(k); });
    let src=a, keyCi=ca, matchIdx=[], srcIdxs=ia, keep=(k)=&gt;keysB.has(k);
    let sheetName=&#x27;Wspólne&#x27;, op=&#x27;∩&#x27;;
    if(m===&#x27;onlyA&#x27;){ keep=(k)=&gt;!keysB.has(k); sheetName=&#x27;Tylko &#x27;+a.name; op=&#x27;−&#x27;; }
    if(m===&#x27;onlyB&#x27;){ src=b; keyCi=cb; srcIdxs=ib; keep=(k)=&gt;!keysA.has(k); sheetName=&#x27;Tylko &#x27;+b.name; op=&#x27;−&#x27;; }
    srcIdxs.forEach(i=&gt;{ const k=normKey(src.rows[i][keyCi]); if(k &amp;&amp; keep(k)) matchIdx.push(i); });
    if(!matchIdx.length){ toast(&#x27;Brak wierszy dla wybranego trybu&#x27;); return; }
    const seed={
      columns:src.columns.slice(),
      order:src.order.slice(),
      visible:src.visible.slice(),
      widths:src.widths.slice(),
      rows:matchIdx.map(i=&gt;src.rows[i].slice())
    };
    const ns=newSheet(sheetName.slice(0,40), seed);
    matchIdx.forEach((oldRi,j)=&gt;{
      if(src.rowColors[oldRi]) ns.rowColors[j]=src.rowColors[oldRi];
      if(src.rowStatus&amp;&amp;src.rowStatus[oldRi]) ns.rowStatus[j]=src.rowStatus[oldRi];
    });
    App.sheets.push(ns);
    App.activeId=ns.id;
    dlg.classList.add(&#x27;hidden&#x27;); bd.classList.add(&#x27;hidden&#x27;);
    setRibbonTab(&#x27;edycja&#x27;);
    render();
    scheduleAutosave();
    toast(&#x27;Karta „&#x27;+ns.name+&#x27;”: &#x27;+matchIdx.length+&#x27; wierszy (&#x27;+a.columns[ca]+&#x27; &#x27;+op+&#x27; &#x27;+b.columns[cb]+&#x27;)&#x27;);
  };
}

function openGroupDlg(){

  dlg.querySelector(&#x27;#gOk&#x27;).onclick=()=&gt;{

    const headers=[&#x27;Grupa&#x27;,&#x27;Liczba&#x27;]; if(agg!==&#x27;&#x27;&amp;&amp;fn!==&#x27;count&#x27;) headers.push(fn===&#x27;sum&#x27;?&#x27;Suma&#x27;:&#x27;Średnia&#x27;);
    const rows=[];

      const idxs=groups[key]; const line=[key, String(idxs.length)];
      if(agg!==&#x27;&#x27;&amp;&amp;fn!==&#x27;count&#x27;){ const nums=idxs.map(i=&gt;toNum(sh.rows[i][+agg])).filter(n=&gt;n!=null); const sum=nums.reduce((a,b)=&gt;a+b,0); line.push(String(fn===&#x27;sum&#x27;?sum:(nums.length?sum/nums.length:0))); }
      rows.push(line);
    });
    const seed={columns:headers, rows, order:headers.map((_,i)=&gt;i), visible:headers.map(()=&gt;true), widths:headers.map(()=&gt;160)};
    const ns=newSheet(&#x27;Podsumowanie&#x27;, seed); App.sheets.push(ns); App.activeId=ns.id; dlg.classList.add(&#x27;hidden&#x27;); bd.classList.add(&#x27;hidden&#x27;); render(); toast(&#x27;Utworzono podsumowanie&#x27;);
  };
}

async function copySelected(opts){
  opts=opts||{};
  const sh=active(); if(!sh) return false;
  const doArch=opts.archive!=null?!!opts.archive:(App.copyMode===&#x27;archive&#x27;);

  // Co idzie do schowka + które wiersze ewentualnie → Archiwum
  let text=&#x27;&#x27;;
  let archiveRows=[];
  let copyLabel=&#x27;&#x27;;

  if(App.selRange){
    const s=App.selRange;
    const cells=(s.r1-s.r0+1)*(s.c1-s.c0+1);
    text=rangeTSV(sh);
    for(let r=s.r0;r&lt;=s.r1;r++) archiveRows.push(r);
    copyLabel=cells===1?&#x27;komórkę&#x27;:(&#x27;zakres &#x27;+ (s.r1-s.r0+1)+&#x27;×&#x27;+(s.c1-s.c0+1));
  }else if(sh.selected.size){
    const idxs=[...sh.selected].sort((a,b)=&gt;a-b);
    archiveRows=idxs;
    if(idxs.length===1 &amp;&amp; App.activeCell &amp;&amp; App.activeCell.r===idxs[0]){
      text=String(sh.rows[App.activeCell.r][App.activeCell.c]??&#x27;&#x27;);
      copyLabel=&#x27;komórkę&#x27;;
    }else{
      text=rowsTSV(sh, idxs);
      copyLabel=idxs.length+&#x27; wierszy&#x27;;
    }
  }else if(App.activeCell){
    text=String(sh.rows[App.activeCell.r][App.activeCell.c]??&#x27;&#x27;);
    archiveRows=[App.activeCell.r];
    copyLabel=&#x27;komórkę&#x27;;
  }else{
    toast(&#x27;Zaznacz komórkę lub wiersz&#x27;); return false;
  }

  const ok=await copyText(text);
  if(!ok){ toast(&#x27;Nie udało się skopiować&#x27;); return false; }

  if(doArch){
    if(sh.name===&#x27;Archiwum&#x27;){
      toast(&#x27;Skopiowano &#x27;+copyLabel+&#x27; (jesteś w Archiwum — bez przenoszenia)&#x27;);
      return true;
    }
    // tryb → Archiwum: schowek = komórka/zakres, a CAŁE wiersze idą do Archiwum

function detectKeyColumnByData(sh){

  let bestNip=-1, bestNipCount=0;
  for(let ci=0; ci&lt;sh.columns.length; ci++){
    let peselCount=0, nipCount=0;
    sample.forEach(row=&gt;{
      const v=row[ci];
      if(looksLikePesel(v)) peselCount++;
      else if(looksLikeNip(v)) nipCount++;
    });
    if(peselCount&gt;bestPeselCount){ bestPeselCount=peselCount; bestPesel=ci; }
    if(nipCount&gt;bestNipCount){ bestNipCount=nipCount; bestNip=ci; }
  }
  const threshold=Math.max(3, sample.length*0.5);

}
function findKeyColumn(sh){

function finalizeRegistryAfterPaste(sh){

  // A = NIP, B = PESEL (Twoja baza)
  if(sh.columns.length&gt;=1 &amp;&amp; !/nip/i.test(String(sh.columns[0])) &amp;&amp; !/pesel/i.test(String(sh.columns[0]))){

function computePersonStatus(dates){
  const today=todayISO();
  const todayD=parseISODate(today);
  const slots=dates.map(v=&gt;{
    const t=norm(v);
    if(!t) return {kind:&#x27;empty&#x27;};
    if(isNieFiguruje(t)) return {kind:&#x27;na&#x27;};
    const d=parseISODate(t);
    return d?{kind:&#x27;date&#x27;, d}:{kind:&#x27;empty&#x27;};
  });
  const filled=slots.filter(s=&gt;s.kind===&#x27;na&#x27;||s.kind===&#x27;date&#x27;);
  const dateSlots=slots.filter(s=&gt;s.kind===&#x27;date&#x27;).map(s=&gt;s.d);
  if(!filled.length) return {stan:REG_STATUS.todo, komplet:&#x27;&#x27;};
  if(filled.length&lt;slots.length) return {stan:REG_STATUS.partial, komplet:&#x27;&#x27;};
  // wszystkie systemy „załatwione” (data albo Pomiń)
  if(!dateSlots.length) return {stan:REG_STATUS.ok, komplet:&#x27;&#x27;};
  const oldest=dateSlots.reduce((a,b)=&gt;a&lt;b?a:b);
  const age=daysBetween(oldest, todayD);
  const komplet=oldest.toISOString().slice(0,10);
  if(age&gt;REG_CYCLE_DAYS) return {stan:REG_STATUS.overdue, komplet};
  if(dateSlots.every(d=&gt;d.toISOString().slice(0,10)===today) &amp;&amp; slots.every(s=&gt;s.kind===&#x27;na&#x27;||s.kind===&#x27;date&#x27;)){
    // jeśli są same dzisiejsze daty (+ ewentualnie NA) → Dziś
    if(slots.some(s=&gt;s.kind===&#x27;date&#x27;)) return {stan:REG_STATUS.today, komplet};
  }
  if(dateSlots.every(d=&gt;d.toISOString().slice(0,10)===today)) return {stan:REG_STATUS.today, komplet};
  return {stan:REG_STATUS.ok, komplet};
}

  reg.rows.forEach((r,i)=&gt;{
    cols.forEach(ci=&gt;{
      const k=cleanId(r[ci]);
      if(k &amp;&amp; /^\d{10}$/.test(k)) idx.set(k,i);
    });
  });
  return idx;
}
/** Szukaj klucza w CAŁEJ bazie (ostateczność) — zapobiega duplikatom przy złej nazwie kolumny. */
function findRegistryRowScanAll(reg, key){
  const k=cleanId(key);
  if(!reg||!k) return null;
  for(let i=0;i&lt;reg.rows.length;i++){
    const row=reg.rows[i];
    for(let ci=0;ci&lt;reg.columns.length;ci++){
      if(cleanId(row[ci])===k) return i;
    }
  }
  return null;
}
/** Znajdź wiersz w bazie po PESEL albo NIP — także po kolumnie ustawionej „Ustaw kolumnę klucza”. */
function findRegistryRowByKey(reg, key){
  if(!reg||!key) return null;
  const k=cleanId(key);
  if(!k) return null;
  const all=registryIdentityIndex(reg);
  if(all.has(k)) return all.get(k);
  if(keyKind(k)===&#x27;pesel&#x27;){
    const by=registryIndexByPesel(reg);
    if(by.has(k)) return by.get(k);
  }
  if(keyKind(k)===&#x27;nip&#x27;){
    const by=registryIndexByNip(reg);
    if(by.has(k)) return by.get(k);
  }
  // Ostatecznie: przeskanuj wszystkie komórki (osoba już jest w bazie pod inną kolumną)
  return findRegistryRowScanAll(reg, k);
}
/** Dodaj osobę do bazy — NIE dokłada kolumny PESEL, jeśli baza ma już kolumnę klucza. */
function ensureRegistryPerson(reg, key){
  let dest=findRegistryRowByKey(reg, key);
  if(dest!=null) return dest;
  const k=cleanId(key);
  if(!k) return -1;
  const kind=keyKind(k);
  let targetCi=-1;
  if(kind===&#x27;nip&#x27;){
    targetCi=findSystemCol(reg,&#x27;NIP&#x27;);
    if(targetCi&lt;0) targetCi=findKeyColumn(reg);
    if(targetCi&lt;0) targetCi=ensureCol(reg,&#x27;NIP&#x27;,130);
  }else{
    targetCi=findSystemCol(reg,&#x27;PESEL&#x27;);
    if(targetCi&lt;0) targetCi=findKeyColumn(reg);
    if(targetCi&lt;0) targetCi=ensureCol(reg,&#x27;PESEL&#x27;,130);
  }
  if(targetCi&lt;0) return -1;
  const row=Array.from({length:reg.columns.length},()=&gt;&#x27;&#x27;);
  row[targetCi]=k;
  dest=reg.rows.length;
  reg.rows.push(row);
  return dest;
}
/** Znajdź kolumnę systemu na liście: dokładna nazwa, potem zawiera „kawa”/„infz”… */
function findListSystemCol(sh, name){
  let ci=findSystemCol(sh, name);
  if(ci&gt;=0) return ci;
  const up=name.toUpperCase();
  return sh.columns.findIndex(c=&gt;{
    const n=norm(c).toUpperCase();
    return n===up || n.includes(up);
  });
}

function pickKeyColumnInteractive(sh){
  let ci=findKeyColumn(sh);
  if(ci&gt;=0) return ci;
  if(!sh.columns.length) return -1;
  
  const sample=sh.rows.slice(0, 3);
  const options=sh.order.filter(i=&gt;sh.visible[i]).map(ci=&gt;{
    const colLetter=letter(sh.order.indexOf(ci));
    const colName=sh.columns[ci]||&#x27;?&#x27;;
    const sampleVals=sample.map(r=&gt;String(r[ci]||&#x27;&#x27;).slice(0,15)).join(&#x27;, &#x27;);
    const hint=looksLikePesel(sample[0]?.[ci])?&#x27;(wygląda na PESEL)&#x27;:looksLikeNip(sample[0]?.[ci])?&#x27;(wygląda na NIP)&#x27;:&#x27;&#x27;;
    return `${colLetter}: ${colName} → ${sampleVals} ${hint}`;
  }).join(&#x27;\n&#x27;);
  
  const ans=prompt(&#x27;Która kolumna zawiera PESEL lub NIP?\nWpisz literę kolumny:\n\n&#x27;+options, &#x27;A&#x27;);
  if(ans==null) return -1;
  const letterUp=norm(ans).toUpperCase();
  const orderPos=LETTERS.indexOf(letterUp);
  if(orderPos&gt;=0 &amp;&amp; orderPos&lt;sh.order.length){
    sh._keyColCache=sh.order[orderPos];
    return sh._keyColCache;
  }
  const byName=sh.columns.findIndex(c=&gt;norm(c).toLowerCase()===norm(ans).toLowerCase());
  if(byName&gt;=0) sh._keyColCache=byName;
  return byName;
}
function setKeyColumnManual(){
  const sh=active();
  if(!sh||!sh.columns.length){ toast(&#x27;Brak danych na karcie&#x27;); return; }
  
  const sample=sh.rows.slice(0, 3);
  const options=sh.order.filter(i=&gt;sh.visible[i]).map(ci=&gt;{
    const colLetter=letter(sh.order.indexOf(ci));
    const colName=sh.columns[ci]||&#x27;?&#x27;;
    const sampleVals=sample.map(r=&gt;String(r[ci]||&#x27;&#x27;).slice(0,15)).join(&#x27;, &#x27;);
    const hint=looksLikePesel(sample[0]?.[ci])?&#x27;← PESEL&#x27;:looksLikeNip(sample[0]?.[ci])?&#x27;← NIP&#x27;:&#x27;&#x27;;
    return `${colLetter}: ${colName} → ${sampleVals} ${hint}`;
  }).join(&#x27;\n&#x27;);
  
  const current=findKeyColumn(sh);
  const currentInfo=current&gt;=0?`\nObecnie: kolumna ${letter(sh.order.indexOf(current))} (${sh.columns[current]})`:&#x27;&#x27;;
  
  const ans=prompt(&#x27;Która kolumna zawiera PESEL lub NIP?\nWpisz literę kolumny:&#x27;+currentInfo+&#x27;\n\n&#x27;+options, current&gt;=0?letter(sh.order.indexOf(current)):&#x27;A&#x27;);
  if(ans==null) return;
  const letterUp=norm(ans).toUpperCase();
  const orderPos=LETTERS.indexOf(letterUp);
  if(orderPos&gt;=0 &amp;&amp; orderPos&lt;sh.order.length){
    sh._keyColCache=sh.order[orderPos];
    toast(&#x27;Kolumna klucza: &#x27;+letterUp+&#x27; (&#x27;+sh.columns[sh._keyColCache]+&#x27;)&#x27;);
  }else{
    toast(&#x27;Nieprawidłowa kolumna&#x27;);
  }
}

function appendSourceTag(existing, tag){
  const t=norm(tag); if(!t) return existing||&#x27;&#x27;;
  const parts=String(existing||&#x27;&#x27;).split(&#x27;;&#x27;).map(s=&gt;s.trim()).filter(Boolean);
  if(parts.includes(t)) return parts.join(&#x27;; &#x27;);
  parts.push(t);
  return parts.join(&#x27;; &#x27;);
}
/** Znacznik źródła z nazwy listy (+ opcjonalnie systemy). Kolumny listy ≠ kolumny Zobowiązanych. */
function listSourceTag(sh, systems){
  const base=norm(sh&amp;&amp;sh.name?sh.name:&#x27;lista&#x27;)+&#x27; &#x27;+todayISO();
  if(systems&amp;&amp;systems.length&amp;&amp;systems.length&lt;REG_SYSTEMS.length){
    return base+&#x27; [&#x27;+systems.join(&#x27;+&#x27;)+&#x27;]&#x27;;
  }
  if(systems&amp;&amp;systems.length===REG_SYSTEMS.length) return base+&#x27; [komplet]&#x27;;
  return base;
}
function tagPersonSource(reg, destRi, tag){
  if(!reg||destRi==null||destRi&lt;0) return;
  const zci=ensureCol(reg,&#x27;Źródła&#x27;,160);
  if(zci&lt;0) return;
  reg.rows[destRi][zci]=appendSourceTag(reg.rows[destRi][zci], tag);
}
function mergeActiveIntoRegistry(){
  const src=active();
  if(!src||!src.rows.length){ toast(&#x27;Brak danych do scalenia&#x27;); return; }
  if(isRegistrySheet(src)){ toast(&#x27;Jesteś już w Zobowiązanych&#x27;); return; }
  const keyCi=pickKeyColumnInteractive(src);
  if(keyCi&lt;0){ toast(&#x27;Anulowano — potrzebny klucz PESEL/NIP&#x27;); return; }

  pushUndo();
  const reg=ensureRegistrySheet(false);
  ensureCol(reg,&#x27;PESEL&#x27;,130);
  REG_SYSTEMS.forEach(n=&gt;ensureCol(reg,n,100));
  REG_META.forEach(n=&gt;ensureCol(reg,n,160));

  const regMap=registryColMap(reg);
  const pci=regMap[&#x27;PESEL&#x27;];
  const byPesel=registryIndexByPesel(reg);
  const idxs=src.selected.size?[...src.selected].sort((a,b)=&gt;a-b):src.rows.map((_,i)=&gt;i);
  const tag=listSourceTag(src);
  let added=0, updated=0, skipped=0;

  idxs.forEach(ri=&gt;{
    const key=normPesel(src.rows[ri][keyCi]);
    if(!key){ skipped++; return; }
    let destRi=byPesel.get(key);
    if(destRi==null){
      const row=Array.from({length:reg.columns.length},()=&gt;&#x27;&#x27;);
      row[pci]=key;
      destRi=reg.rows.length;
      reg.rows.push(row);
      byPesel.set(key, destRi);
      added++;
    }else updated++;
    // tylko PESEL + ślad źródła — kolumn z listy VAT/Mariusze NIE mieszamy do bazy
    tagPersonSource(reg, destRi, tag);
  });

  refreshRegistryDerived(reg);
  render();
  toast(&#x27;Zobowiązani: +&#x27;+added+&#x27; nowych, &#x27;+updated+&#x27; z tagiem „&#x27;+tag+&#x27;”&#x27;+(skipped?&#x27;, bez klucza: &#x27;+skipped:&#x27;&#x27;));
}
function enrichActiveFromRegistry(){
  const sh=active();
  if(!sh||!sh.rows.length){ toast(&#x27;Brak danych&#x27;); return; }
  const reg=getRegistrySheet();
  if(!reg||!reg.rows.length){ toast(&#x27;Baza pusta — najpierw Zapamiętaj z listy&#x27;); return; }

  const keyCi=pickKeyColumnInteractive(sh);
  if(keyCi&lt;0){ toast(&#x27;Anulowano — potrzebny klucz&#x27;); return; }

  pushUndo();
  if(isRegistrySheet(sh)){
    refreshRegistryDerived(sh);
    render();
    toast(&#x27;Odświeżono stany w Zobowiązanych&#x27;);
    return;
  }

  const stanCi=ensureCol(sh,&#x27;Stan&#x27;,120);
  const kompCi=ensureCol(sh,&#x27;Komplet&#x27;,110);
  if(stanCi&lt;0){ toast(&#x27;Brak miejsca na kolumny (limit A–Z)&#x27;); return; }

  const byPesel=registryIndexByPesel(reg);
  const rmap=registryColMap(reg);
  const counts={todo:0, partial:0, overdue:0, ok:0, today:0, unknown:0};

  sh.rows.forEach((row,ri)=&gt;{
    const key=normPesel(row[keyCi]);
    const dest=key?byPesel.get(key):null;
    if(dest==null){
      row[stanCi]=REG_STATUS.todo;
      if(kompCi&gt;=0) row[kompCi]=&#x27;&#x27;;
      sh.rowColors[ri]=&#x27;yellow&#x27;;
      counts.todo++; counts.unknown++;
      return;
    }
    const dates=REG_SYSTEMS.map(n=&gt;{ const ci=rmap[n]; return ci!=null?(reg.rows[dest][ci]||&#x27;&#x27;):&#x27;&#x27;; });
    const {stan,komplet}=computePersonStatus(dates);
    row[stanCi]=stan;
    if(kompCi&gt;=0) row[kompCi]=komplet;
    const color=REG_STATUS_COLOR[stan];
    if(color) sh.rowColors[ri]=color; else delete sh.rowColors[ri];
    if(stan===REG_STATUS.todo) counts.todo++;
    else if(stan===REG_STATUS.partial) counts.partial++;
    else if(stan===REG_STATUS.overdue) counts.overdue++;
    else if(stan===REG_STATUS.today) counts.today++;
    else counts.ok++;
  });

  fitColumnWidths(sh,{wrap:true});
  render();
  const due=counts.todo+counts.partial+counts.overdue;
  toast(&#x27;Do zrobienia &#x27;+due+&#x27; · OK/Dziś &#x27;+(counts.ok+counts.today)+&#x27; · poza bazą: &#x27;+counts.unknown);
}
function markSystemsToday(systems){
  const list=(systems&amp;&amp;systems.length)?systems.slice():REG_SYSTEMS.slice();
  const sh=active();
  if(!sh) return;

  if(App.workMode===&#x27;adhoc&#x27; &amp;&amp; !isRegistrySheet(sh)){
    toast(&#x27;Włącz tryb „Z bazą&quot; (u góry) aby używać oznaczeń KAWA/JPK…&#x27;);
    return;
  }

  let reg=isRegistrySheet(sh) ? sh : ensureRegistrySheet(false);
  if(!reg){ toast(&#x27;Nie udało się utworzyć Zobowiązanych&#x27;); return; }

  const idxs=sh.selected.size?[...sh.selected]: (App.activeCell?[App.activeCell.r]:[]);
  if(!idxs.length){ toast(&#x27;Zaznacz osobę / wiersze (albo kliknij komórkę)&#x27;); return; }

  const missing=ensureRegistrySystemCols(reg);
  if(missing.length){
    toast(&#x27;Nie mogę zapisać &#x27;+missing.join(&#x27;+&#x27;)+&#x27; w Zobowiązanych — za dużo kolumn (limit A–Z). Usuń zbędne kolumny w bazie.&#x27;);
    return;
  }

  pushUndo();
  const today=todayISO();
  const tag=listSourceTag(sh, list);
  let n=0, wroteSystems=0;

  if(isRegistrySheet(sh)){
    const map=registryColMap(sh);
    idxs.forEach(ri=&gt;{
      padSheetRow(sh, ri);
      const vals={}; list.forEach(name=&gt;vals[name]=today);
      const res=writeSystemsToRegistryRow(sh, ri, vals, map);
      if(res.ok){ wroteSystems+=res.wrote.length; tagPersonSource(sh, ri, tag); n++; }
    });
    refreshRegistryDerived(sh);
  }else{
    let keyCi=findKeyColumn(sh);
    if(keyCi&lt;0) keyCi=pickKeyColumnInteractive(sh);
    if(keyCi&lt;0){ toast(&#x27;Anulowano&#x27;); return; }
    const rmap=registryColMap(reg);
    idxs.forEach(ri=&gt;{
      // PESEL albo NIP z wiersza (nie tylko „główna” kolumna)
      let key=norm(sh.rows[ri][keyCi]).replace(/[\s-]/g,&#x27;&#x27;);
      if(!key){
        const nipCi=findSystemCol(sh,&#x27;NIP&#x27;);
        const peselCi=findSystemCol(sh,&#x27;PESEL&#x27;);
        if(peselCi&gt;=0) key=norm(sh.rows[ri][peselCi]).replace(/[\s-]/g,&#x27;&#x27;);
        if(!key &amp;&amp; nipCi&gt;=0) key=norm(sh.rows[ri][nipCi]).replace(/[\s-]/g,&#x27;&#x27;);
      }
      if(!key) return;
      const dest=ensureRegistryPerson(reg, key);
      const vals={}; list.forEach(name=&gt;vals[name]=today);
      const res=writeSystemsToRegistryRow(reg, dest, vals, rmap);
      if(res.ok){ wroteSystems+=res.wrote.length; tagPersonSource(reg, dest, tag); n++; }
    });
    refreshRegistryDerived(reg);
    const listColMap={};
    list.forEach(name=&gt;{
      let ci=findSystemCol(sh, name);
      if(ci&lt;0) ci=ensureCol(sh, name, 90);
      listColMap[name]=ci;
    });
    revealCols(sh, list.concat([&#x27;Stan&#x27;,&#x27;Komplet&#x27;]));
    const stanCi=ensureCol(sh,&#x27;Stan&#x27;,120);
    const kompCi=ensureCol(sh,&#x27;Komplet&#x27;,110);
    idxs.forEach(ri=&gt;{
      list.forEach(name=&gt;{
        const ci=listColMap[name];
        if(ci&gt;=0) sh.rows[ri][ci]=today;
      });
      let key=norm(sh.rows[ri][keyCi]).replace(/[\s-]/g,&#x27;&#x27;);
      if(!key){
        const nipCi=findSystemCol(sh,&#x27;NIP&#x27;);
        const peselCi=findSystemCol(sh,&#x27;PESEL&#x27;);
        if(peselCi&gt;=0) key=norm(sh.rows[ri][peselCi]).replace(/[\s-]/g,&#x27;&#x27;);
        if(!key &amp;&amp; nipCi&gt;=0) key=norm(sh.rows[ri][nipCi]).replace(/[\s-]/g,&#x27;&#x27;);
      }
      const dest=key?findRegistryRowByKey(reg, key):null;
      if(dest==null) return;
      const dates=REG_SYSTEMS.map(name=&gt;reg.rows[dest][rmap[name]]||&#x27;&#x27;);
      const {stan,komplet}=computePersonStatus(dates);
      if(stanCi&gt;=0) sh.rows[ri][stanCi]=stan;
      if(kompCi&gt;=0) sh.rows[ri][kompCi]=komplet;
      sh.rowColors[ri]=REG_STATUS_COLOR[stan]||&#x27;blue&#x27;;
    });
  }
  revealCols(reg, list);
  render();
  scheduleAutosave();
  const label=list.length===REG_SYSTEMS.length?&#x27;Komplet&#x27;:list.join(&#x27;+&#x27;);
  if(!n){
    toast(label+&#x27;: nic nie zapisano w Zobowiązanych (brak PESEL/NIP albo brak kolumn systemów)&#x27;);
  }else{
    toast(label+&#x27; → Zobowiązani (&#x27;+n+&#x27; osób, pól: &#x27;+wroteSystems+&#x27;) · otwórz kartę Zobowiązani i przewiń do &#x27;+label);
  }
}

function pickSystemsInteractive(title, prechecked){
  const checked=new Set(prechecked||[]);
  const lines=REG_SYSTEMS.map((n,i)=&gt; (checked.has(n)?&#x27;[x] &#x27;:&#x27;[ ] &#x27;)+ (i+1)+&#x27;. &#x27;+n).join(&#x27;\n&#x27;);
  const ans=prompt((title||&#x27;Wybierz systemy&#x27;)+&#x27;\nPodaj numery lub nazwy po przecinku (np. 4,5 albo JPK,INFZ):\n\n&#x27;+lines, &#x27;&#x27;);
  if(ans==null) return null;
  const raw=norm(ans);
  if(!raw) return [];
  const out=[];
  raw.split(/[,;\s]+/).forEach(tok=&gt;{
    const t=tok.trim(); if(!t) return;
    if(/^\d+$/.test(t)){
      const i=+t-1; if(i&gt;=0&amp;&amp;i&lt;REG_SYSTEMS.length) out.push(REG_SYSTEMS[i]);
      return;
    }
    const up=t.toUpperCase();
    const hit=REG_SYSTEMS.find(s=&gt;s===up || s.toLowerCase()===t.toLowerCase());
    if(hit) out.push(hit);
  });
  return [...new Set(out)];
}

function syncListToRegistry(){
  const sh=active();
  if(!sh){ toast(&#x27;Brak aktywnej karty&#x27;); return; }
  if(isRegistrySheet(sh)){ toast(&#x27;Jesteś już na bazie Zobowiązanych&#x27;); return; }
  if(sh.name===PARK_SHEET || sh.name===&#x27;Archiwum&#x27;){ toast(&#x27;Synchronizacja działa tylko z list roboczych&#x27;); return; }
  if(App.workMode===&#x27;adhoc&#x27;){ toast(&#x27;Włącz tryb „Z bazą&quot; (u góry), żeby synchronizować&#x27;); return; }

  // 1) Kolumna PESEL/NIP na liście roboczej (honoruje „Ustaw kolumnę klucza”)
  let listKeyCol=findKeyColumn(sh);
  if(listKeyCol&lt;0) listKeyCol=pickKeyColumnInteractive(sh);
  if(listKeyCol&lt;0){ toast(&#x27;Wskaż kolumnę PESEL lub NIP na liście (przycisk „Ustaw kolumnę klucza”)&#x27;); return; }
  sh._keyColCache=listKeyCol;

  // 2) Baza Zobowiązani + kolumny KAWA/SINF/…
  const reg=ensureRegistrySheet(false);
  if(!reg){ toast(&#x27;Brak bazy Zobowiązanych&#x27;); return; }
  // Upewnij się, że baza też ma ustawiony klucz (albo nazwany PESEL/NIP)
  if(findKeyColumn(reg)&lt;0){
    const regKey=pickKeyColumnInteractive(reg);
    if(regKey&gt;=0) reg._keyColCache=regKey;
  }
  const missing=ensureRegistrySystemCols(reg);
  if(missing.length){
    toast(&#x27;Nie mogę utworzyć kolumn &#x27;+missing.join(&#x27;, &#x27;)+&#x27; w Zobowiązanych (limit A–Z). Usuń zbędne kolumny w bazie.&#x27;);
    return;
  }

  // 3) Kolumny systemów na LIŚCIE (stamtąd bierzemy daty)
  const listSys={};
  let sysFound=0;
  REG_SYSTEMS.forEach(name=&gt;{
    const ci=findListSystemCol(sh, name);
    if(ci&gt;=0){ listSys[name]=ci; sysFound++; }
  });
  if(!sysFound){
    toast(&#x27;Na liście nie ma kolumn KAWA/SINF/UFG/JPK/INFZ — najpierw oznacz przyciskami albo wklej daty.&#x27;);
    return;
  }

  // 4) Kolumny systemów w BAZIE (tu zapisujemy)
  const regSys={};
  REG_SYSTEMS.forEach(name=&gt;{
    const ci=findSystemCol(reg, name);
    if(ci&gt;=0) regSys[name]=ci;
  });
  const idIndex=registryIdentityIndex(reg);
  const today=todayISO();
  const tag=listSourceTag(sh, [&#x27;SYNC&#x27;]);
  const idxs=sh.selected.size?[...sh.selected].sort((a,b)=&gt;a-b):sh.rows.map((_,i)=&gt;i);
  const listPeselCi=findSystemCol(sh,&#x27;PESEL&#x27;);
  const listNipCi=findSystemCol(sh,&#x27;NIP&#x27;);

  function keysFromListRow(ri){
    const keys=[];
    const seen=new Set();
    const add=(v)=&gt;{
      const k=cleanId(v);
      if(!k||seen.has(k)) return;
      seen.add(k); keys.push(k);
    };
    add(sh.rows[ri][listKeyCol]);
    if(listPeselCi&gt;=0) add(sh.rows[ri][listPeselCi]);
    if(listNipCi&gt;=0) add(sh.rows[ri][listNipCi]);
    return keys;
  }
  function systemsFromListRow(ri){
    const vals={};
    REG_SYSTEMS.forEach(name=&gt;{
      const ci=listSys[name];
      if(ci==null) return;
      const parsed=parseListSystemValue(sh.rows[ri][ci]);
      if(parsed) vals[name]=parsed;
    });
    return vals;
  }
  function findDest(keys){
    for(let i=0;i&lt;keys.length;i++){
      if(idIndex.has(keys[i])) return idIndex.get(keys[i]);
      const d=findRegistryRowByKey(reg, keys[i]);
      if(d!=null) return d;
    }
    return null;
  }

  function writeValsToDest(dest, vals){
    padSheetRow(reg, dest);
    let changed=false;
    Object.keys(vals).forEach(name=&gt;{
      let ci=regSys[name];
      if(ci==null||ci&lt;0) ci=findSystemCol(reg, name);
      if(ci==null||ci&lt;0){
        ci=ensureCol(reg, name, 100);
        if(ci&gt;=0) regSys[name]=ci;
      }
      if(ci==null||ci&lt;0) return;
      if(norm(reg.rows[dest][ci])===norm(vals[name])) return;
      reg.rows[dest][ci]=vals[name];
      systemsTouched.add(name);
      fieldsWritten++;
      changed=true;
    });
    return changed;
  }

  let updated=0, added=0, skipped=0, alreadyOk=0, notInBase=[];
  const systemsTouched=new Set();
  let fieldsWritten=0;

  pushUndo();

  idxs.forEach(ri=&gt;{
    const keys=keysFromListRow(ri);
    if(!keys.length){ skipped++; return; }
    const vals=systemsFromListRow(ri);
    if(!Object.keys(vals).length){ skipped++; return; }

    let dest=findDest(keys);
    if(dest==null){
      notInBase.push({ri, key:keys[0], keys, vals});
      return;
    }

    const changed=writeValsToDest(dest, vals);
    if(changed){
      tagPersonSource(reg, dest, tag);
      keys.forEach(k=&gt;idIndex.set(k, dest));
      updated++;
    }else{
      alreadyOk++;
    }
  });

  if(notInBase.length){
    // Jeszcze raz pełny skan — często osoba JEST w bazie, tylko kolumna klucza była źle ustawiona
    const stillMissing=[];
    notInBase.forEach(item=&gt;{
      let dest=findDest(item.keys);
      if(dest==null){
        for(let i=0;i&lt;item.keys.length &amp;&amp; dest==null;i++) dest=findRegistryRowScanAll(reg, item.keys[i]);
      }
      if(dest!=null){
        if(writeValsToDest(dest, item.vals)){
          tagPersonSource(reg, dest, tag);
          item.keys.forEach(k=&gt;idIndex.set(k, dest));
          updated++;
        }else alreadyOk++;
      }else{
        stillMissing.push(item);
      }
    });
    notInBase=stillMissing;
  }

  if(notInBase.length){
    const names=notInBase.slice(0,5).map(x=&gt;x.key).join(&#x27;, &#x27;)+(notInBase.length&gt;5?&#x27;…&#x27;:&#x27;&#x27;);
    const add=confirm(
      &#x27;Nie znaleziono w Zobowiązanych (po PESEL/NIP): &#x27;+notInBase.length+&#x27;\n&#x27;+names+
      &#x27;\n\nKlucz listy: &#x27;+shLetterOrName(sh, listKeyCol)+
      &#x27;\nSzukano w bazie w: &#x27;+(registryIdentityCols(reg).map(ci=&gt;shLetterOrName(reg,ci)).join(&#x27;, &#x27;)||&#x27;(cała tabela)&#x27;)+
      &#x27;\n\nUWAGA: lepiej najpierw sprawdź „Ustaw kolumnę klucza” na Zobowiązanych.&#x27;+
      &#x27;\nDodać jako NOWE wiersze z datami KAWA/SINF/…?&#x27;
    );
    if(add){
      ensureRegistrySystemCols(reg);
      REG_SYSTEMS.forEach(name=&gt;{ regSys[name]=findSystemCol(reg, name); });
      notInBase.forEach(({key, keys, vals})=&gt;{
        // Ostatni skan przed dodaniem
        let dest=findDest(keys||[key]);
        if(dest==null) dest=findRegistryRowScanAll(reg, key);
        if(dest!=null){
          if(writeValsToDest(dest, vals)){ tagPersonSource(reg, dest, tag); updated++; }
          return;
        }
        // Tylko gdy na pewno da się zapisać systemy
        const canWrite=Object.keys(vals).some(name=&gt;{
          let ci=regSys[name];
          if(ci==null||ci&lt;0) ci=findSystemCol(reg, name);
          if(ci&lt;0) ci=ensureCol(reg, name, 100);
          if(ci&gt;=0) regSys[name]=ci;
          return ci&gt;=0;
        });
        if(!canWrite){ return; }
        dest=ensureRegistryPerson(reg, key);
        if(dest&lt;0) return;
        if(!writeValsToDest(dest, vals)){
          // Cofnij pusty wiersz bez KAWA/INFZ
          if(dest===reg.rows.length-1) reg.rows.pop();
          return;
        }
        (keys||[key]).forEach(k=&gt;idIndex.set(k, dest));
        tagPersonSource(reg, dest, tag);
        added++;
      });
    }
  }

  refreshRegistryDerived(reg);
  revealCols(reg, [...REG_SYSTEMS, ...REG_META]);

  // Odśwież Stan na liście z bazy
  const stanOut=ensureCol(sh,&#x27;Stan&#x27;,120);
  const kompOut=ensureCol(sh,&#x27;Komplet&#x27;,110);
  idxs.forEach(ri=&gt;{
    const dest=findDest(keysFromListRow(ri));
    if(dest==null) return;
    REG_SYSTEMS.forEach(name=&gt;{
      const lci=listSys[name];
      const rci=regSys[name];
      if(lci!=null &amp;&amp; rci!=null &amp;&amp; norm(reg.rows[dest][rci])) sh.rows[ri][lci]=reg.rows[dest][rci];
    });
    const dates=REG_SYSTEMS.map(name=&gt;{
      const rci=regSys[name];
      return rci!=null?(reg.rows[dest][rci]||&#x27;&#x27;):&#x27;&#x27;;
    });
    const {stan,komplet}=computePersonStatus(dates);
    if(stanOut&gt;=0) sh.rows[ri][stanOut]=stan;
    if(kompOut&gt;=0) sh.rows[ri][kompOut]=komplet;
    const color=REG_STATUS_COLOR[stan];
    if(color) sh.rowColors[ri]=color;
  });

  // Zawsze pokaż bazę po syncu, żeby było widać KAWA/INFZ
  App.activeId=reg.id;
  render();
  scheduleAutosave();

  const sysHint=systemsTouched.size?&#x27; · &#x27;+[...systemsTouched].join(&#x27;+&#x27;):&#x27;&#x27;;
  if(updated||added){
    toast(&#x27;OK: przeniesiono do Zobowiązanych — wierszy &#x27;+ (updated+added) +&#x27;, pól &#x27;+fieldsWritten+sysHint+&#x27; (przewiń do KAWA/SINF/…)&#x27;);
  }else if(alreadyOk){
    toast(&#x27;Daty z listy już są w Zobowiązanych (&#x27;+alreadyOk+&#x27;). Jesteś na karcie bazy — przewiń w prawo do KAWA/SINF/INFZ.&#x27;);
  }else if(notInBase.length){
    toast(&#x27;Nie przeniesiono — brak dopasowania PESEL/NIP. Ustaw kolumnę klucza na liście i na Zobowiązanych.&#x27;);
  }else{
    toast(&#x27;Nic do przeniesienia — na liście brak dat w kolumnach KAWA/SINF/UFG/JPK/INFZ (wierszy bez klucza: &#x27;+skipped+&#x27;).&#x27;);
  }
}
function shLetterOrName(sh, ci){
  if(!sh||ci==null||ci&lt;0) return &#x27;?&#x27;;
  const pos=sh.order.indexOf(ci);
  const L=pos&gt;=0?letter(pos):&#x27;?&#x27;;
  return L+&#x27;=&#x27;+(sh.columns[ci]||&#x27;?&#x27;);
}
function addMissingToRegistry(){
  const sh=active();
  if(!sh){ toast(&#x27;Brak aktywnej karty&#x27;); return; }
  if(isRegistrySheet(sh)){ toast(&#x27;Jesteś na bazie — ta funkcja dodaje z listy do bazy&#x27;); return; }
  if(sh.name===PARK_SHEET || sh.name===&#x27;Archiwum&#x27;){ toast(&#x27;Działa tylko z list roboczych&#x27;); return; }
  if(!sh.rows.length){ toast(&#x27;Lista jest pusta&#x27;); return; }

  let keyCi=findKeyColumn(sh);
  if(keyCi&lt;0) keyCi=pickKeyColumnInteractive(sh);
  if(keyCi&lt;0){ toast(&#x27;Brak kolumny PESEL/NIP — nie mogę porównać&#x27;); return; }

  const reg=ensureRegistrySheet(false);
  ensureCol(reg,&#x27;NIP&#x27;,130);
  ensureCol(reg,&#x27;PESEL&#x27;,130);
  REG_SYSTEMS.forEach(n=&gt;ensureCol(reg,n,100));
  REG_META.forEach(n=&gt;ensureCol(reg,n,160));

  const idxs=sh.selected.size?[...sh.selected].sort((a,b)=&gt;a-b):sh.rows.map((_,i)=&gt;i);
  let added=0, known=0, skipped=0;
  pushUndo();
  idxs.forEach(ri=&gt;{
    const key=norm(sh.rows[ri][keyCi]).replace(/[\s-]/g,&#x27;&#x27;);
    if(!key){ skipped++; return; }
    if(findRegistryRowByKey(reg, key)!=null){ known++; return; }
    ensureRegistryPerson(reg, key);
    added++;
  });
  refreshRegistryDerived(reg);
  render();
  scheduleAutosave();
  toast(&#x27;Dodaj do bazy: +&#x27;+added+&#x27; nowych · już było &#x27;+known+(skipped?&#x27; · bez klucza &#x27;+skipped:&#x27;&#x27;));
}

    ?(&#x27;Zobowiązani: &#x27;+reg.rows.length+&#x27; osób — tu wklejasz BAZĘ&#x27;)
    :&#x27;Pusta baza — wklej tu PESEL-e albo oznaczaj z Listy przyciskami KAWA/JPK…&#x27;);
}
function filterByStan(modes){
  const sh=active(); if(!sh) return;
  const stanCi=sh.columns.indexOf(&#x27;Stan&#x27;);
  if(stanCi&lt;0){ toast(&#x27;Najpierw Pokaż status (kolumna Stan)&#x27;); setRibbonTab(&#x27;rejestr&#x27;); return; }
  pushUndo();
  if(!modes||!modes.length){ delete sh.colFilters[stanCi]; render(); toast(&#x27;Wyczyszczono filtr stanu&#x27;); return; }
  sh.colFilters[stanCi]={mode:&#x27;in_list&#x27;, values:modes.slice()};
  render();
  toast(&#x27;Filtr: &#x27;+modes.join(&#x27; / &#x27;));
}

function getParkingSheet(){ return App.sheets.find(s=&gt;s.name===PARK_SHEET)||null; }
function ensureParkingSheet(switchTo){
  let park=getParkingSheet();
  if(!park){
    const cols=[&#x27;PESEL&#x27;,&#x27;Źródło&#x27;,&#x27;Opis&#x27;,&#x27;Dodano&#x27;,&#x27;Status&#x27;];
    park=newSheet(PARK_SHEET, {
      columns:cols, rows:[],
      order:cols.map((_,i)=&gt;i),
      visible:cols.map(()=&gt;true),
      widths:[130,160,280,110,100]
    });
    App.sheets.push(park);
  }else{
    [&#x27;PESEL&#x27;,&#x27;Źródło&#x27;,&#x27;Opis&#x27;,&#x27;Dodano&#x27;,&#x27;Status&#x27;].forEach((n,i)=&gt;ensureCol(park,n, i===2?280:i===1?160:110));
  }
  if(switchTo) App.activeId=park.id;
  return park;
}
function buildParkOpis(sh, ri, keyCi){
  const parts=[];
  visCols(sh).forEach(ci=&gt;{
    if(ci===keyCi) return;
    const name=sh.columns[ci];
    if(name===&#x27;Stan&#x27;||name===&#x27;Komplet&#x27;) return;
    const v=norm(sh.rows[ri][ci]);
    if(!v) return;
    parts.push(name+&#x27;: &#x27;+v);
  });
  if(!parts.length){
    sh.columns.forEach((name,ci)=&gt;{
      if(ci===keyCi||name===&#x27;Stan&#x27;||name===&#x27;Komplet&#x27;) return;
      const v=norm(sh.rows[ri][ci]);
      if(v) parts.push(name+&#x27;: &#x27;+v);
    });
  }
  const s=parts.join(&#x27; · &#x27;);
  return s.length&gt;500?s.slice(0,497)+&#x27;…&#x27;:s;
}
function deferSelectedToParking(){
  const sh=active();
  if(!sh||!sh.rows.length){ toast(&#x27;Brak danych&#x27;); return; }
  if(sh.name===PARK_SHEET){ toast(&#x27;Jesteś już w Na później&#x27;); return; }
  if(isRegistrySheet(sh)){ toast(&#x27;Odkładaj z Listy (JPK itd.), nie z Zobowiązanych&#x27;); return; }
  const idxs=sh.selected.size?[...sh.selected].sort((a,b)=&gt;a-b):(App.activeCell?[App.activeCell.r]:[]);
  if(!idxs.length){ toast(&#x27;Zaznacz wiersze do odłożenia&#x27;); return; }
  const keyCi=pickKeyColumnInteractive(sh);
  if(keyCi&lt;0){ toast(&#x27;Anulowano — potrzebny PESEL&#x27;); return; }

  pushUndo();
  const park=ensureParkingSheet(false);
  // kolumny strukturalne ze źródła (po nazwie), z limitem A–Z
  const skip=new Set([&#x27;PESEL&#x27;,&#x27;Stan&#x27;,&#x27;Komplet&#x27;,&#x27;Źródło&#x27;,&#x27;Opis&#x27;,&#x27;Dodano&#x27;,&#x27;Status&#x27;]);
  const extra=[];
  sh.columns.forEach((name,ci)=&gt;{
    if(ci===keyCi) return;
    const n=norm(name); if(!n || skip.has(n)) return;
    if(ensureCol(park, n, 120)&gt;=0) extra.push(n);
  });
  const map={}; park.columns.forEach((n,i)=&gt;map[n]=i);
  const srcTag=(sh.name||&#x27;lista&#x27;)+&#x27; &#x27;+todayISO();
  let n=0, skipped=0;
  idxs.forEach(ri=&gt;{
    const key=normPesel(sh.rows[ri][keyCi]);
    if(!key){ skipped++; return; }
    const opis=buildParkOpis(sh, ri, keyCi)||&#x27;(bez opisu)&#x27;;
    const fingerprint=extra.map(col=&gt;{
      const sci=sh.columns.indexOf(col);
      return sci&gt;=0?norm(sh.rows[ri][sci]):&#x27;&#x27;;
    }).join(&#x27;\u0001&#x27;);
    const dup=park.rows.some(r=&gt;{
      if(normPesel(r[map.PESEL])!==key) return false;
      if(norm(r[map.Status])!==PARK_STATUS_WAIT) return false;
      if(norm(r[map[&#x27;Źródło&#x27;]])!==srcTag) return false;
      const fp=extra.map(col=&gt;norm(r[map[col]]||&#x27;&#x27;)).join(&#x27;\u0001&#x27;);
      return fp===fingerprint || (norm(r[map.Opis])===opis &amp;&amp; !fingerprint);
    });
    if(dup) return;
    const row=Array.from({length:park.columns.length},()=&gt;&#x27;&#x27;);
    row[map.PESEL]=key;
    row[map[&#x27;Źródło&#x27;]]=srcTag;
    row[map.Opis]=opis;
    row[map.Dodano]=todayISO();
    row[map.Status]=PARK_STATUS_WAIT;
    extra.forEach(col=&gt;{
      const sci=sh.columns.indexOf(col);
      if(sci&gt;=0 &amp;&amp; map[col]!=null) row[map[col]]=norm(sh.rows[ri][sci]);
    });
    park.rows.push(row);
    park.rowColors[park.rows.length-1]=&#x27;amber&#x27;;
    n++;
  });
  ensureRegistrySheet(false);
  const reg=getRegistrySheet();
  const rmap=registryColMap(reg);
  const byPesel=registryIndexByPesel(reg);
  idxs.forEach(ri=&gt;{
    const key=normPesel(sh.rows[ri][keyCi]);
    if(!key) return;
    if(byPesel.has(key)) return;
    const row=Array.from({length:reg.columns.length},()=&gt;&#x27;&#x27;);
    row[rmap.PESEL]=key;
    const zci=rmap[&#x27;Źródła&#x27;];
    if(zci!=null) row[zci]=appendSourceTag(&#x27;&#x27;, srcTag);
    reg.rows.push(row);
  });
  refreshRegistryDerived(reg);
  render();
  toast(n?(&#x27;Odłożono &#x27;+n+&#x27; → Na później&#x27;+(extra.length?&#x27; · +&#x27;+extra.length+&#x27; kol.&#x27;:&#x27;&#x27;)+(skipped?&#x27;, bez PESEL: &#x27;+skipped:&#x27;&#x27;)):&#x27;Nic nowego (już było lub brak PESEL)&#x27;);
}

}

}

function resolveSelectedPesel(){
  const sh=active(); if(!sh) return &#x27;&#x27;;
  let key=&#x27;&#x27;;
  if(isRegistrySheet(sh) || sh.name===PARK_SHEET){
    const pci=sh.columns.indexOf(&#x27;PESEL&#x27;);
    const idxs=sh.selected.size?[...sh.selected]:(App.activeCell?[App.activeCell.r]:[]);
    if(pci&gt;=0 &amp;&amp; idxs.length) key=normPesel(sh.rows[idxs[0]][pci]);
  }else{
    const keyCi=findKeyColumn(sh);
    const idxs=sh.selected.size?[...sh.selected]:(App.activeCell?[App.activeCell.r]:[]);
    if(keyCi&gt;=0 &amp;&amp; idxs.length) key=normPesel(sh.rows[idxs[0]][keyCi]);
  }
  if(!key){
    const ans=prompt(&#x27;PESEL osoby:&#x27;);
    if(ans==null) return &#x27;&#x27;;
    key=normPesel(ans);
  }
  return key;
}

function archivePeselSet(){
  const set=new Set();
  const arch=App.sheets.find(s=&gt;s.name===&#x27;Archiwum&#x27;);
  if(!arch) return set;
  const ci=findKeyColumn(arch);
  if(ci&lt;0) return set;
  arch.rows.forEach(r=&gt;{ const k=normPesel(r[ci]); if(k) set.add(k); });
  return set;
}
function parkingWaitPeselSet(){
  const set=new Set();
  const park=getParkingSheet();
  if(!park) return set;
  const pci=park.columns.indexOf(&#x27;PESEL&#x27;);
  const sci=park.columns.indexOf(&#x27;Status&#x27;);
  if(pci&lt;0) return set;
  park.rows.forEach(r=&gt;{
    if(sci&gt;=0 &amp;&amp; norm(r[sci])!==PARK_STATUS_WAIT) return;
    const k=normPesel(r[pci]); if(k) set.add(k);
  });
  return set;
}
function runReworkGuard(){
  const sh=active();
  if(!sh||!sh.rows.length){ toast(&#x27;Brak danych&#x27;); return; }
  if(isRegistrySheet(sh)||sh.name===PARK_SHEET){ toast(&#x27;Strażnik działa na listach roboczych&#x27;); return; }

  let keyCi=findKeyColumn(sh);
  if(keyCi&lt;0) keyCi=pickKeyColumnInteractive(sh);
  if(keyCi&lt;0){ toast(&#x27;Anulowano&#x27;); return; }

  pushUndo();
  const warnCi=ensureCol(sh,&#x27;Ostrzeżenie&#x27;,200);
  if(warnCi&lt;0){ toast(&#x27;Brak miejsca na kolumnę Ostrzeżenie&#x27;); return; }

  const reg=getRegistrySheet();
  if(reg) refreshRegistryDerived(reg);
  const rmap=reg?registryColMap(reg):{};
  const arch=archivePeselSet();
  const parkWait=parkingWaitPeselSet();
  let hits=0;

  sh.rows.forEach((row,ri)=&gt;{
    const key=norm(row[keyCi]).replace(/[\s-]/g,&#x27;&#x27;);
    const flags=[];
    const peselLike=keyKind(key)===&#x27;pesel&#x27;?normPesel(key):&#x27;&#x27;;
    if(peselLike &amp;&amp; arch.has(peselLike)) flags.push(&#x27;Archiwum&#x27;);
    if(peselLike &amp;&amp; parkWait.has(peselLike)) flags.push(&#x27;parking&#x27;);
    if(key &amp;&amp; reg){
      const dest=findRegistryRowByKey(reg, key);
      if(dest!=null){
        const rrow=reg.rows[dest]||[];
        const stan=rmap.Stan!=null?norm(rrow[rmap.Stan]):&#x27;&#x27;;
        const done=[];
        REG_SYSTEMS.forEach(name=&gt;{
          const ci=rmap[name];
          if(ci!=null &amp;&amp; isSystemChecked(rrow[ci])) done.push(name+(isNieFiguruje(rrow[ci])?&#x27; (n/f)&#x27;:&#x27;&#x27;));
        });
        if(stan===REG_STATUS.today || stan===REG_STATUS.ok || done.length===REG_SYSTEMS.length){
          flags.push(&#x27;świeży komplet&#x27;+(done.length?(&#x27; (&#x27;+done.join(&#x27;+&#x27;)+&#x27;)&#x27;):&#x27;&#x27;));
        }else if(stan===REG_STATUS.partial || (done.length&gt;0 &amp;&amp; done.length&lt;REG_SYSTEMS.length)){
          flags.push(&#x27;częściowo obróbiony: &#x27;+done.join(&#x27;+&#x27;));
        }
        if(stan===REG_STATUS.overdue) flags.push(&#x27;&gt;100 dni&#x27;);
      }
    }
    if(flags.length){
      row[warnCi]=flags.join(&#x27; · &#x27;);
      if(flags.some(f=&gt;f.startsWith(&#x27;świeży komplet&#x27;)||f===&#x27;Archiwum&#x27;)) sh.rowColors[ri]=&#x27;red&#x27;;
      else if(flags.some(f=&gt;f.startsWith(&#x27;częściowo&#x27;))) sh.rowColors[ri]=&#x27;orange&#x27;;
      else sh.rowColors[ri]=&#x27;amber&#x27;;
      hits++;
    }else{
      row[warnCi]=&#x27;&#x27;;
    }
  });

  const n=sorted(sh, filtered(sh)).length;
  fitColumnWidths(sh, {wrap: n&lt;VIRT_THRESHOLD});
  if(n&gt;=VIRT_THRESHOLD) App.wrap=false;
  try{saveViewPrefs();}catch(_){}
  render();
  scheduleAutosave();
  toast(hits?(&#x27;Wyłącz duplikaty: &#x27;+hits+&#x27; ostrzeżeń&#x27;):&#x27;Wyłącz duplikaty: czysto&#x27;);
}

const PANIC_LAW_HTML=`
&lt;h3&gt;DZIAŁ I&lt;br&gt;Przepisy ogólne&lt;/h3&gt;
&lt;p&gt;Art. 1. Ustawa normuje postępowanie egzekucyjne w administracji, zwane dalej „postępowaniem egzekucyjnym”, oraz zabezpieczenie wykonania obowiązków podlegających egzekucji administracyjnej.&lt;/p&gt;
&lt;p&gt;Art. 1a. Ilekroć w ustawie jest mowa o:&lt;/p&gt;

&lt;p&gt;2) wierzycielu — rozumie się przez to podmiot uprawniony do żądania wykonania obowiązku albo jego zabezpieczenia w drodze egzekucji administracyjnej;&lt;/p&gt;
&lt;p&gt;3) zobowiązanym — rozumie się przez to osobę prawną lub fizyczną, a także jednostkę organizacyjną niemającą osobowości prawnej, która nie wykonała w terminie obowiązku o charakterze pieniężnym lub niepieniężnym, a w postępowaniu zabezpieczającym także osobę lub jednostkę, której obowiązek nie jest jeszcze wymagalny albo ustalony;&lt;/p&gt;
&lt;p&gt;Art. 2. § 1. Egzekucji administracyjnej podlegają obowiązki o charakterze pieniężnym i niepieniężnym.&lt;/p&gt;
&lt;p&gt;§ 2. Egzekucji administracyjnej podlegają w szczególności:&lt;/p&gt;
&lt;p&gt;1) podatki, opłaty i inne należności, do których stosuje się przepisy działu III ustawy z dnia 29 sierpnia 1997 r. — Ordynacja podatkowa;&lt;/p&gt;

&lt;p&gt;Art. 5. § 1. Organem egzekucyjnym jest naczelnik urzędu skarbowego, właściwy ze względu na miejsce zamieszkania lub siedzibę zobowiązanego, a w zakresie egzekucji administracyjnej świadczeń pieniężnych — także dyrektor izby administracji skarbowej oraz dyrektor oddziału Zakładu Ubezpieczeń Społecznych, jeżeli są wierzycielami tych świadczeń.&lt;/p&gt;
&lt;p&gt;Art. 6. § 1. Wierzyciel może żądać przeprowadzenia egzekucji administracyjnej, jeżeli obowiązek wynika z decyzji, postanowienia, orzeczenia lub innego aktu, albo z przepisu prawa.&lt;/p&gt;
&lt;p&gt;§ 2. Wierzyciel przed wszczęciem egzekucji wzywa zobowiązanego do wykonania obowiązku, wyznaczając mu termin do wykonania.&lt;/p&gt;
&lt;p&gt;Art. 7. § 1. Organ egzekucyjny wszczyna egzekucję na wniosek wierzyciela i na podstawie wystawionego przez niego tytułu wykonawczego.&lt;/p&gt;
&lt;p&gt;§ 2. Organ egzekucyjny może z urzędu wszcząć egzekucję, jeżeli jest jednocześnie wierzycielem.&lt;/p&gt;
&lt;p&gt;Art. 8. Tytuł wykonawczy powinien zawierać w szczególności: oznaczenie wierzyciela i zobowiązanego, treść egzekwowanego obowiązku, wskazanie podstawy prawnej, pouczenie o prawie wniesienia zarzutów.&lt;/p&gt;
&lt;p&gt;Art. 15. § 1. Organ egzekucyjny bada z urzędu, czy obowiązek podlega egzekucji administracyjnej oraz czy tytuł wykonawczy spełnia wymagania.&lt;/p&gt;
&lt;p&gt;Art. 17. Zarzuty w sprawie egzekucji administracyjnej zobowiązany może zgłosić w terminie 7 dni od dnia doręczenia odpisu tytułu wykonawczego.&lt;/p&gt;
&lt;p&gt;Art. 18. Zgłoszenie zarzutów nie wstrzymuje postępowania egzekucyjnego, chyba że organ egzekucyjny postanowi inaczej.&lt;/p&gt;

&lt;p&gt;Art. 22. Egzekucję należności pieniężnych prowadzi się według przepisów niniejszego działu, stosując środki egzekucyjne określone w ustawie.&lt;/p&gt;
&lt;p&gt;Art. 26. Środkami egzekucyjnymi należności pieniężnych są w szczególności: egzekucja z pieniędzy, z wynagrodzenia za pracę, z rachunków bankowych, z innych wierzytelności pieniężnych, z praw majątkowych, z ruchomości oraz z nieruchomości.&lt;/p&gt;

function getOrCreateArchive(source){
  let arch=App.sheets.find(s=&gt;s.name===&#x27;Archiwum&#x27;);
  if(!arch){
    arch=newSheet(&#x27;Archiwum&#x27;);
    arch.columns=[&#x27;_dataObsługi&#x27;, ...source.columns];
    arch.order=arch.columns.map((_,i)=&gt;i);
    arch.visible=arch.columns.map(()=&gt;true);
    arch.widths=arch.columns.map((_,i)=&gt;i===0?170:(source.widths[i-1]||150));
    App.sheets.push(arch);
    return arch;
  }
  if(!arch.columns.length || arch.columns[0]!==&#x27;_dataObsługi&#x27;){
    const rest=arch.columns[0]===&#x27;_dataObsługi&#x27;?arch.columns.slice(1):arch.columns.slice();
    arch.columns=[&#x27;_dataObsługi&#x27;, ...(rest.length?rest:source.columns.slice())];
    arch.order=arch.columns.map((_,i)=&gt;i);
    while(arch.visible.length&lt;arch.columns.length) arch.visible.push(true);
    while(arch.widths.length&lt;arch.columns.length) arch.widths.push(150);
  }
  source.columns.forEach((h,i)=&gt;{
    const ti=i+1;
    if(arch.columns[ti]==null){ arch.columns[ti]=h; arch.order.push(ti); arch.visible.push(true); arch.widths.push(source.widths[i]||150); }
  });
  return arch;
}
function markHandledToArchive(opts){

  let v=String(val??&#x27;&#x27;), w=String(what??&#x27;&#x27;);
  if(!w) return false;
  if(!caseSens){ v=v.toLowerCase(); w=w.toLowerCase(); }
  return whole ? v===w : v.includes(w);
}
function findNext(fromDlg){
  const sh=active(); if(!sh||!sh.rows.length){ toast(&#x27;Brak danych&#x27;); return; }
  const dlg=$(&#x27;findDlg&#x27;);
  const what=(dlg &amp;&amp; !dlg.classList.contains(&#x27;hidden&#x27;) &amp;&amp; dlg.querySelector(&#x27;#findWhat&#x27;)) ? dlg.querySelector(&#x27;#findWhat&#x27;).value : (App._findWhat||&#x27;&#x27;);
  if(!what){ toast(&#x27;Wpisz tekst do znalezienia&#x27;); return; }
  App._findWhat=what;
  const caseSens=!!(dlg&amp;&amp;dlg.querySelector(&#x27;#findCase&#x27;)&amp;&amp;dlg.querySelector(&#x27;#findCase&#x27;).checked);
  const whole=!!(dlg&amp;&amp;dlg.querySelector(&#x27;#findWhole&#x27;)&amp;&amp;dlg.querySelector(&#x27;#findWhole&#x27;).checked);
  const cols=visCols(sh);
  const idxs=sorted(sh, filtered(sh));
  let startR=App.findCursor.r||0, startC=App.findCursor.c||0;
  if(App.activeCell){ startR=App.activeCell.r; startC=App.activeCell.c+1; }
  const pairs=[];
  idxs.forEach(ri=&gt;cols.forEach(ci=&gt;pairs.push([ri,ci])));
  if(!pairs.length){ toast(&#x27;Brak widocznych komórek&#x27;); return; }
  let startIdx=0;
  for(let i=0;i&lt;pairs.length;i++){
    const [ri,ci]=pairs[i];
    if(ri&gt;startR || (ri===startR &amp;&amp; ci&gt;=startC)){ startIdx=i; break; }
    startIdx=0;
  }
  for(let step=0; step&lt;pairs.length; step++){
    const [ri,ci]=pairs[(startIdx+step)%pairs.length];
    if(cellMatches(sh.rows[ri][ci], what, caseSens, whole)){
      App.findCursor={r:ri,c:ci};
      sh.selected.clear(); sh.selected.add(ri); sh.last=ri;
      setActiveCell(sh,ri,ci);
      renderGrid();
      const cell=document.querySelector(&#x27;td.cell-active&#x27;);
      if(cell) cell.scrollIntoView({block:&#x27;center&#x27;, inline:&#x27;nearest&#x27;});
      toast(&#x27;Znaleziono: &#x27;+letter(sh.order.indexOf(ci))+(idxs.indexOf(ri)+1), &#x27;copy&#x27;);
      return;
    }
  }
  toast(&#x27;Nie znaleziono&#x27;);
}
function replaceAll(){
  const sh=active(); if(!sh) return;
  const dlg=$(&#x27;findDlg&#x27;);
  const what=dlg.querySelector(&#x27;#findWhat&#x27;).value;
  const withTxt=dlg.querySelector(&#x27;#findWith&#x27;).value;
  if(!what){ toast(&#x27;Wpisz tekst do znalezienia&#x27;); return; }
  const caseSens=dlg.querySelector(&#x27;#findCase&#x27;).checked;
  const whole=dlg.querySelector(&#x27;#findWhole&#x27;).checked;
  const cols=visCols(sh);
  const idxs=sorted(sh, filtered(sh));
  let n=0;
  pushUndo();
  idxs.forEach(ri=&gt;cols.forEach(ci=&gt;{
    const cur=String(sh.rows[ri][ci]??&#x27;&#x27;);
    if(!cellMatches(cur, what, caseSens, whole)) return;
    if(whole){ sh.rows[ri][ci]=withTxt; n++; return; }
    if(caseSens){ sh.rows[ri][ci]=cur.split(what).join(withTxt); n++; }
    else{
      const low=cur.toLowerCase(), needle=what.toLowerCase();
      let out=&#x27;&#x27;, from=0, p;
      while((p=low.indexOf(needle, from))&gt;=0){
        out+=cur.slice(from,p)+withTxt; from=p+needle.length;
      }
      out+=cur.slice(from); sh.rows[ri][ci]=out; n++;
    }
  }));
  applyColorRules(sh); render();
  toast(n?(&#x27;Zamieniono w &#x27;+n+&#x27; komórkach&#x27;):&#x27;Brak dopasowań&#x27;);
}
function pasteMatrixAt(matrix, startR, startC){
  const sh=active(); if(!sh||!matrix||!matrix.length) return false;
  rememberPaste(matrix, &#x27;Wklej tu&#x27;);
  pushUndo();
  const needCols=Math.min(MAX, Math.max(...matrix.map(r=&gt;r.length))+startC);
  while(sh.columns.length&lt;needCols){
    const i=sh.columns.length;
    sh.columns.push(&#x27;Kolumna &#x27;+letter(i));
    sh.order.push(i); sh.visible.push(true); sh.widths.push(150);
  }
  if(!sh.columns.length){ toast(&#x27;Brak kolumn&#x27;); return false; }
  const endR=startR+matrix.length;
  while(sh.rows.length&lt;endR) sh.rows.push(Array.from({length:sh.columns.length},()=&gt;&#x27;&#x27;));
  sh.rows.forEach(r=&gt;{ while(r.length&lt;sh.columns.length) r.push(&#x27;&#x27;); });
  matrix.forEach((row,dr)=&gt;{
    const ri=startR+dr;
    row.forEach((val,dc)=&gt;{
      const ci=startC+dc;
      if(ci&gt;=sh.columns.length) return;
      sh.rows[ri][ci]=val==null?&#x27;&#x27;:String(val);
    });
  });
  applyColorRules(sh);
  fitColumnWidths(sh,{wrap:true});
  render();
  if(matrix.length){
    const er=startR+matrix.length-1;
    const ec=startC+Math.max(...matrix.map(r=&gt;r.length))-1;
    focusCell(startR, startC, false);
    setSelRange(startR, startC, Math.min(er, sh.rows.length-1), Math.min(ec, sh.columns.length-1));
    App.anchorCell={r:startR,c:startC};
    renderGrid();
  }
  toast(&#x27;Wklejono &#x27;+matrix.length+&#x27;×&#x27;+(matrix[0]?.length||0)+&#x27; od &#x27;+letter(sh.order.indexOf(startC))+(startR+1)+&#x27; · kolumny dopasowane&#x27;);
  return true;
}
async function readClipboardMatrix(){
  try{
    const items=await navigator.clipboard.read();
    for(const it of items){
      if(it.types.includes(&#x27;text/html&#x27;)){
        const m=parseHtml(await (await it.getType(&#x27;text/html&#x27;)).text());
        if(m) return m;
      }
    }
    for(const it of items){
      if(it.types.includes(&#x27;text/plain&#x27;)){
        const raw=await (await it.getType(&#x27;text/plain&#x27;)).text();
        const m=parsePdfSmart(raw,{mode:&#x27;auto&#x27;,cols:&#x27;auto&#x27;})||parseText(raw);
        if(m) return m;
      }
    }
  }catch(_){}
  return null;
}
async function triggerPasteHere(){
  const sh=active(); if(!sh) return;
  let m=await readClipboardMatrix();
  if(!m){ toast(&#x27;Użyj Ctrl+V albo skopiuj tabelę i kliknij ponownie&#x27;); return; }
  // Surowa macierz bez odcinania nagłówka — wklejanie w miejsce
  let startR=0, startC=0;
  if(App.activeCell){ startR=App.activeCell.r; startC=App.activeCell.c; }
  else if(sh.selected.size){ startR=Math.min(...sh.selected); startC=visCols(sh)[0]||0; }
  else if(sh.columns.length){ startR=sh.rows.length; startC=0; m=m; /* append-like */ }
  pasteMatrixAt(m, startR, startC);
}
