$(&#x27;btnExport&#x27;).onclick=e=&gt;{e.stopPropagation(); $(&#x27;exportMenu&#x27;).classList.toggle(&#x27;open&#x27;);};
$(&#x27;btnPdf&#x27;).onclick=()=&gt;{$(&#x27;exportMenu&#x27;).classList.remove(&#x27;open&#x27;); toast(&#x27;Zapisz jako PDF w oknie druku&#x27;); setTimeout(()=&gt;window.print(),200);};
$(&#x27;btnExportCopy&#x27;).onclick=()=&gt;{
  const sel=resolveExportSelected(); if(sel===null) return;
  copyTableForWord(sel, false);
};
document.querySelectorAll(&#x27;#exportScope [data-export-scope]&#x27;).forEach(b=&gt;{
  b.onclick=()=&gt;setExportScope(b.dataset.exportScope);
});
$(&#x27;btnToExisting&#x27;).onclick=e=&gt;{e.stopPropagation(); const menu=$(&#x27;sheetPickMenu&#x27;); $(&#x27;sheetMoveMenu&#x27;).classList.remove(&#x27;open&#x27;); menu.classList.toggle(&#x27;open&#x27;); fillSheetPickMenu(menu, false);};
$(&#x27;btnMoveToExisting&#x27;).onclick=e=&gt;{e.stopPropagation(); const menu=$(&#x27;sheetMoveMenu&#x27;); $(&#x27;sheetPickMenu&#x27;).classList.remove(&#x27;open&#x27;); menu.classList.toggle(&#x27;open&#x27;); fillSheetPickMenu(menu, true);};
$(&#x27;exportMenu&#x27;).querySelectorAll(&#x27;[data-export]&#x27;).forEach(b=&gt;b.onclick=()=&gt;{
  const m=b.dataset.export; $(&#x27;exportMenu&#x27;).classList.remove(&#x27;open&#x27;);
  const sel=resolveExportSelected(); if(sel===null) return;
  if(m===&#x27;word-plain&#x27;){ exportWord(sel, true); return; }
  if(m===&#x27;word&#x27;){ exportWord(sel, false); return; }
  if(m===&#x27;csv&#x27;) exportCsv(sel);
  else if(m===&#x27;xls&#x27;) exportXls(sel);
});
syncExportScopeUI();
document.onclick=e=&gt;{
  if(!e.target.closest(&#x27;.menu-wrap&#x27;)){[&#x27;exportMenu&#x27;,&#x27;sheetPickMenu&#x27;,&#x27;sheetMoveMenu&#x27;,&#x27;schemaMenu&#x27;,&#x27;pasteHistMenu&#x27;,&#x27;regSysMenu&#x27;].forEach(id=&gt;{const el=$(id); if(el) el.classList.remove(&#x27;open&#x27;);});}
  if(!e.target.closest(&#x27;#colFilterPopup&#x27;)&amp;&amp;!e.target.closest(&#x27;.filter-btn&#x27;)) $(&#x27;colFilterPopup&#x27;).classList.add(&#x27;hidden&#x27;);
  if(!e.target.closest(&#x27;#ctxMenu&#x27;)) hideCtx();
  if(e.target.id===&#x27;backdrop&#x27;){[&#x27;rulesDlg&#x27;,&#x27;dedupDlg&#x27;,&#x27;groupDlg&#x27;,&#x27;compareDlg&#x27;,&#x27;schemaDlg&#x27;,&#x27;pastePdfDlg&#x27;,&#x27;findDlg&#x27;,&#x27;statusDlg&#x27;,&#x27;dossierDlg&#x27;].forEach(id=&gt;{const el=$(id); if(el) el.classList.add(&#x27;hidden&#x27;);}); $(&#x27;backdrop&#x27;).classList.add(&#x27;hidden&#x27;);}
};
document.addEventListener(&#x27;mouseup&#x27;, ()=&gt;{ App.selecting=false; });
document.addEventListener(&#x27;contextmenu&#x27;, e=&gt;{ if(e.target.closest(&#x27;#dataGrid&#x27;)) {/* handled per-row */} });
document.addEventListener(&#x27;keydown&#x27;, e=&gt;{ if(e.key===&#x27;Escape&#x27;) hideCtx(); });
document.addEventListener(&#x27;paste&#x27;, e=&gt;{ if(isPanicOn()){ e.preventDefault(); return; } pasteEvent(e); });
document.addEventListener(&#x27;keydown&#x27;, e=&gt;{
  if(isPanicOn() &amp;&amp; e.key!==&#x27;Escape&#x27;){ e.preventDefault(); return; }
  const sh=active(); if(!sh) return;
  const typing=isGridTypingTarget(e.target) || App.editing;

  if(e.key===&#x27;Escape&#x27;){
    e.preventDefault();
    if(isPanicOn()){
      if(noteEscBurst(true)) hidePanicCover();
      return;
    }
    if(App.editing){ endEdit(false); return; }
    // zamknij otwarte dialogi jednym Esc
    const openDlg=[&#x27;rulesDlg&#x27;,&#x27;dedupDlg&#x27;,&#x27;groupDlg&#x27;,&#x27;compareDlg&#x27;,&#x27;schemaDlg&#x27;,&#x27;pastePdfDlg&#x27;,&#x27;findDlg&#x27;,&#x27;statusDlg&#x27;,&#x27;dossierDlg&#x27;].find(id=&gt;{const el=$(id); return el&amp;&amp;!el.classList.contains(&#x27;hidden&#x27;);});
    if(openDlg){ $(openDlg).classList.add(&#x27;hidden&#x27;); $(&#x27;backdrop&#x27;).classList.add(&#x27;hidden&#x27;); return; }
    hideCtx();
    [&#x27;exportMenu&#x27;,&#x27;sheetPickMenu&#x27;,&#x27;sheetMoveMenu&#x27;,&#x27;schemaMenu&#x27;,&#x27;pasteHistMenu&#x27;,&#x27;regSysMenu&#x27;].forEach(id=&gt;{const el=$(id); if(el) el.classList.remove(&#x27;open&#x27;);});
    if(noteEscBurst(false)){ showPanicCover(); return; }
    sh.selected.clear(); App.activeCell=null; clearSelRange(); App.anchorCell=null;
    $(&#x27;cellRef&#x27;).textContent=&#x27;—&#x27;; $(&#x27;cellValue&#x27;).textContent=&#x27;&#x27;; renderGrid();
    return;
  }

  if((e.ctrlKey||e.metaKey)&amp;&amp;e.key.toLowerCase()===&#x27;f&#x27;&amp;&amp;!typing){e.preventDefault(); openFindDlg(); return;}
  if((e.ctrlKey||e.metaKey)&amp;&amp;e.key.toLowerCase()===&#x27;s&#x27;&amp;&amp;!typing){e.preventDefault(); saveWorkbook(); return;}
  if((e.ctrlKey||e.metaKey)&amp;&amp;e.key.toLowerCase()===&#x27;a&#x27;&amp;&amp;!typing&amp;&amp;document.activeElement.tagName!==&#x27;SELECT&#x27;){
    e.preventDefault();
    const cols=visCols(sh); const idxs=sorted(sh,filtered(sh));
    idxs.forEach(i=&gt;sh.selected.add(i));
    if(idxs.length &amp;&amp; cols.length) setSelRange(idxs[0], cols[0], idxs[idxs.length-1], cols[cols.length-1]);
    renderGrid();
    return;
  }
  if((e.ctrlKey||e.metaKey)&amp;&amp;e.key.toLowerCase()===&#x27;z&#x27;&amp;&amp;!typing){e.preventDefault(); applyUndo(); return;}

  if((e.ctrlKey||e.metaKey)&amp;&amp;e.key.toLowerCase()===&#x27;c&#x27;&amp;&amp;!typing){
    const sel=window.getSelection();
    if(sel&amp;&amp;String(sel).length&amp;&amp;!sh.selected.size&amp;&amp;!App.activeCell&amp;&amp;!App.selRange) return;
    e.preventDefault();
    copySelected();
    return;
  }

  if(typing) return;

  // Nawigacja / edycja Excel-lite
  if([&#x27;ArrowUp&#x27;,&#x27;ArrowDown&#x27;,&#x27;ArrowLeft&#x27;,&#x27;ArrowRight&#x27;].includes(e.key)){
    e.preventDefault();
    if(!App.activeCell){
      const cols=visCols(sh); const idxs=sorted(sh,filtered(sh));
      if(cols.length&amp;&amp;idxs.length) focusCell(idxs[0], cols[0], false);
    }else{
      const dr=e.key===&#x27;ArrowUp&#x27;?-1:e.key===&#x27;ArrowDown&#x27;?1:0;
      const dc=e.key===&#x27;ArrowLeft&#x27;?-1:e.key===&#x27;ArrowRight&#x27;?1:0;
      moveActive(dr,dc,e.shiftKey);
      return;
    }
    renderGrid(); scrollActiveIntoView();
    return;
  }
  if(e.key===&#x27;Tab&#x27;){
    e.preventDefault();
    if(!App.activeCell){
      const cols=visCols(sh); const idxs=sorted(sh,filtered(sh));
      if(cols.length&amp;&amp;idxs.length){ focusCell(idxs[0], cols[0], false); renderGrid(); }
    }else moveActive(0, e.shiftKey?-1:1, false);
    return;
  }
  if(e.key===&#x27;Enter&#x27;){
    e.preventDefault();
    if(!App.activeCell) return;
    if(e.shiftKey) moveActive(-1,0,false);
    else beginEdit(App.activeCell.r, App.activeCell.c);
    return;
  }
  if(e.key===&#x27;F2&#x27;){
    e.preventDefault();
    if(App.activeCell) beginEdit(App.activeCell.r, App.activeCell.c);
    return;
  }
  if(e.key===&#x27;Delete&#x27; || e.key===&#x27;Backspace&#x27;){
    e.preventDefault();
    if(App.selRange) clearRangeCells();
    else if(App.activeCell){
      setSelRange(App.activeCell.r, App.activeCell.c, App.activeCell.r, App.activeCell.c);
      clearRangeCells();
    }
    return;
  }
  // Start edycji przez wpisywanie
  if(e.key.length===1 &amp;&amp; !e.ctrlKey &amp;&amp; !e.metaKey &amp;&amp; !e.altKey){
    if(!App.activeCell){
      const cols=visCols(sh); const idxs=sorted(sh,filtered(sh));
      if(cols.length&amp;&amp;idxs.length) focusCell(idxs[0], cols[0], false);
    }
    if(App.activeCell){
      e.preventDefault();
      beginEdit(App.activeCell.r, App.activeCell.c, e.key);
    }
  }
});
